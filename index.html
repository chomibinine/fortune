<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>운세 통합 플랫폼</title>
<style>
body{font-family:Arial, sans-serif;background:#0f0f1a;color:#fff;margin:0;padding:0;}
.container{max-width:900px;margin:0 auto;padding:20px;}
.card{background:#1b1b2a;padding:20px;border-radius:16px;margin-bottom:16px;}
input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:none;font-size:16px;}
button{background:#6c5ce7;color:#fff;cursor:pointer;}
button:hover{background:#5a4bd6;}
.result{white-space:pre-line;line-height:1.6;}
.small{font-size:12px;opacity:0.7;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr;}}
.counter{font-size:14px;opacity:0.8;}
</style>
</head>
<body>
<div class="container">

<h1>🔮 통합 운세 플랫폼</h1>
<div class="counter">오늘 방문자: <span id="today">0</span> / 누적: <span id="total">0</span></div>

<div class="card">
<h3>기본 정보 입력</h3>
<input id="name" placeholder="이름" />
<input id="birth" type="date" />
<select id="gender">
<option value="M">남성</option>
<option value="F">여성</option>
</select>
<button onclick="runAll()">운세 보기</button>
</div>

<div class="grid">
<div class="card">
<h3>사주 (기본 해석)</h3>
<div id="saju" class="result"></div>
</div>

<div class="card">
<h3>토정비결 (64괘)</h3>
<div id="tojeong" class="result"></div>
</div>

<div class="card">
<h3>별자리 운세</h3>
<div id="zodiac" class="result"></div>
</div>

<div class="card">
<h3>타로</h3>
<div id="tarot" class="result"></div>
</div>
</div>

<div class="card">
<h3>추천 행운 아이템</h3>
<div id="affiliate"></div>
</div>

</div>

<script>
// 방문자 카운터 (localStorage)
let today = localStorage.getItem('todayCount')||0;
let total = localStorage.getItem('totalCount')||0;
today++;
total++;
localStorage.setItem('todayCount',today);
localStorage.setItem('totalCount',total);
document.getElementById('today').innerText=today;
document.getElementById('total').innerText=total;

function getZodiac(date){
const d=new Date(date);
const m=d.getMonth()+1;
const day=d.getDate();
const signs=["염소자리","물병자리","물고기자리","양자리","황소자리","쌍둥이자리","게자리","사자자리","처녀자리","천칭자리","전갈자리","사수자리"];
if((m==1&&day>=20)||(m==2&&day<=18))return signs[1];
if((m==2&&day>=19)||(m==3&&day<=20))return signs[2];
if((m==3&&day>=21)||(m==4&&day<=19))return signs[3];
if((m==4&&day>=20)||(m==5&&day<=20))return signs[4];
if((m==5&&day>=21)||(m==6&&day<=21))return signs[5];
if((m==6&&day>=22)||(m==7&&day<=22))return signs[6];
if((m==7&&day>=23)||(m==8&&day<=22))return signs[7];
if((m==8&&day>=23)||(m==9&&day<=23))return signs[8];
if((m==9&&day>=24)||(m==10&&day<=22))return signs[9];
if((m==10&&day>=23)||(m==11&&day<=22))return signs[10];
if((m==11&&day>=23)||(m==12&&day<=24))return signs[11];
return signs[0];
}

function saju(name,birth){
return name+"님의 사주 흐름은 안정 속 변화형입니다. 초년은 학습운, 중년은 재물운 상승, 말년은 안정과 회복운이 강합니다. 감정보다 구조적 판단이 중요한 시기입니다.";
}

// simplified 64 hexagram pool (sample, extend later)
const hexagrams=["건(乾)","곤(坤)","둔(屯)","몽(蒙)","수(需)","송(訟)","사(師)","비(比)"];

function tojeong(name){
let idx=Math.floor(Math.random()*hexagrams.length);
return "괘: "+hexagrams[idx]+"\n금일 흐름: 선택의 갈림길에서 중심을 지키면 길합니다.";
}

function tarot(){
const cards=["The Fool - 새로운 시작","The Magician - 가능성","The Lovers - 선택","Death - 변화","Sun - 성공"];
let c=cards[Math.floor(Math.random()*cards.length)];
return "카드: "+c+"\n해석: 현재 흐름은 전환점에 있습니다.";
}

function affiliate(){
return '<a href="https://link.coupang.com/a/erylCA" target="_blank">👉 오늘의 행운 아이템 보기</a>';
}

function runAll(){
let name=document.getElementById('name').value;
let birth=document.getElementById('birth').value;

if(!birth)return alert('생년월일 입력');

document.getElementById('saju').innerText=saju(name,birth);
document.getElementById('tojeong').innerText=tojeong(name);
document.getElementById('zodiac').innerText=getZodiac(birth);
document.getElementById('tarot').innerText=tarot();
document.getElementById('affiliate').innerHTML=affiliate();
}
</script>

</body>
</html>
