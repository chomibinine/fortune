            ],
            [ // Type 3: 개척자형
              "<p><b>[초년운]</b> 낡은 틀을 거부하는 반항아적 기질을 타고났습니다. 미지의 길을 향해 겁 없이 뛰어드는 대담한 시기입니다.<br><b>[중년운]</b> 위기와 기회가 교차하는 스펙터클한 시기입니다. 어느 순간 기존 판도를 뒤엎는 혁신으로 시대의 아이콘이 됩니다.<br><b>[말년운]</b> 세상을 바꾼 이에게 주어지는 자유의 시간입니다. 유유자적한 백만장자로서 전 세계를 유람하는 영광의 삶입니다.</p>",
              "<p><b>[초년운]</b> 상상력과 호기심으로 주변을 놀라게 합니다. 시선에 갇히지 않고 독특한 철학을 뾰족하게 다듬어 온 시기입니다.<br><b>[중년운]</b> 독특한 발상이 시대 트렌드와 조우하며 잭팟을 터뜨립니다. 신사업 분야를 선점하여 압도적인 부를 움켜쥐게 됩니다.<br><b>[말년운]</b> 속세의 경쟁을 졸업하고 경제적 자유의 정점에 오릅니다. 예술과 자연을 즐기며 낭만적인 노년을 장식합니다.</p>",
              "<p><b>[초년운]</b> 강렬한 아우라를 지녀 어디서든 눈에 띕니다. 수많은 도전과 실패를 겪으며 야생의 감각을 날카롭게 벼렸습니다.<br><b>[중년운]</b> 갈고닦은 야성이 폭발하며 새로운 규칙을 창조합니다. 과감한 승부수가 적중하여 거대한 위상을 단숨에 거머쥡니다.<br><b>[말년운]</b> 파란만장한 전투를 무용담으로 남기고 명예의 전당에 오릅니다. 초월적인 깨달음과 평안을 얻는 철학자의 노년입니다.</p>"
            ]
          ];
          return intro + solutions[type][variant];
        },
        wealthBase: function(seed) {
          var type = seed % 4;
          var solutions = [
            "<p>단기적인 흐름에 집착하기보다 3~5년 뒤를 내다보는 장기 자산 구축이 유리합니다. 무형의 가치가 실물로 변하는 에너지가 강력합니다.</p>",
            "<p>귀하의 재물운은 네트워크에서 폭발합니다. 이익을 타인과 나누는 상생의 투자를 지향할 때 더 거대한 파이가 돌아오는 명식입니다.</p>",
            "<p>철저한 리스크 관리와 시스템 구축이 재운의 핵심입니다. 데이터에 근거한 보수적 운용을 하되 확신이 서면 과감히 베팅하십시오.</p>",
            "<p>낯선 환경에서 재운이 크게 요동칩니다. 시대 트렌드를 읽고 신기술이나 이종 산업에 발을 담그는 혁신적 태도가 막대한 부를 부릅니다.</p>"
          ];
          return solutions[type];
        },
        healthBase: function(seed) { return "<p>책임감이 강해 뇌 신경계 피로가 먼저 누적되는 패턴입니다. 의도적인 로그아웃과 질 높은 휴식만이 생체 리듬의 균형을 복구할 수 있습니다.</p>"; },
        loveBase: function(seed) { return "<p>나의 주파수가 맑아졌을 때 같은 파동을 가진 인연이 찾아옵니다. 관계의 양보다 질적인 밀도에 집중하여 소울메이트를 찾아야 합니다.</p>"; }
      };

      var tojeongDB = [
        { h: "春山滿花 蝶自來尋", d1: "봄 동산에 꽃이 만발하니 나비가 찾아오는 대길의 형국입니다.", d2: "하반기부터 노력의 결실이 뚜렷하게 나타나며 귀인의 도움으로 큰 기회를 거머쥐게 됩니다." },
        { h: "旱天降雨 萬物蘇生", d1: "오랜 가뭄 끝에 단비가 내려 만물이 소생하듯 답답했던 자금 흐름이 시원하게 뚫립니다.", d2: "가을을 전후하여 문서운이 강력해지니 중요한 계약이나 결정은 이때 내리시는 것이 좋습니다." },
        { h: "舟行順風 萬里無雲", d1: "순풍에 돛을 달고 배를 띄우니 구름 한 점 없는 만사형통의 운기입니다.", d2: "직장이나 사업에서 기대 이상의 성과를 거둡니다. 겸손을 유지한다면 이 운기가 길게 이어집니다." },
        { h: "明月出雲 處處生光", d1: "밝은 달이 구름을 벗어나니 곳곳이 빛납니다. 마음고생이 끝나고 진가가 인정받는 해입니다.", d2: "올해의 핵심은 명예입니다. 승진이나 합격 소식이 들려올 것이니 네트워킹에 조금 더 힘쓰십시오." }
      ];

      var starTraits = { "양": "열정의 불꽃", "황소": "풍요의 대지", "쌍둥이": "지성의 바람", "게": "감정의 샘", "사자": "태양의 군주", "처녀": "완벽한 수확자", "천칭": "조화의 저울", "전갈": "심연의 통찰", "사수": "자유의 화살", "염소": "고독한 정상", "물병": "혁신의 별", "물고기": "무한한 바다" };
      var tarotDB = [
        { n: "THE SUN", s: "성공과 기쁨이 찾아오는 순간", d: "모든 것이 명쾌해집니다. 본인의 능력을 믿고 에너지를 밖으로 발산하십시오." },
        { n: "THE EMPRESS", s: "물질적 풍요와 정서적 만족", d: "주변을 따뜻하게 돌보고 여유를 즐기십시오. 행운이 자연스럽게 들어옵니다." }
      ];

      // --- 3. 핵심 로직 엔진 ---
      function getOhaeng(gan) { if('甲乙'.includes(gan[0])) return '목(木)'; if('丙丁'.includes(gan[0])) return '화(火)'; if('戊己'.includes(gan[0])) return '토(土)'; if('庚辛'.includes(gan[0])) return '금(金)'; return '수(水)'; }
      function getStarSign(m, d) { var dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22]; var signs = ["염소", "물병", "물고기", "양", "황소", "쌍둥이", "게", "사자", "처녀", "천칭", "전갈", "사수", "염소"]; return signs[d > dates[m - 1] ? m : m - 1]; }

      // --- 4. 화면 렌더링 ---
      window.renderPage = function(view) {
        var siteId = "fortune-navigator-hits-final";
        var counterBadgeUrl = "https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=" + encodeURIComponent("https://github.com/" + siteId) + "&count_bg=%2300f2ff&title_bg=%230d1117&title=%EB%B0%A9%EB%AC%B8%EC%9E%90&edge_flat=false";

        var html = '<style>' + css + '</style><div class="app-wrapper" id="app-wrapper"><div class="container">';
        if (view === 'home') {
          html += '<div class="intro-box"><h1>운명의 나침반</h1><p>천문 데이터 기반 프리미엄 운세 카운슬링</p><div style="margin-top:18px;"><img src="' + counterBadgeUrl + '"></div></div>' +
            '<div class="card"><label>대상자 성함</label><input type="text" id="ui-name" value="'+state.name+'" placeholder="성함을 입력하세요">' +
            '<label>력 선택</label><div class="btn-row"><div id="s-btn" class="t-btn '+(state.cal==='solar'?'on':'')+'" onclick="window.updateCal(\'solar\')">양력</div><div id="l-btn" class="t-btn '+(state.cal==='lunar'?'on':'')+'" onclick="window.updateCal(\'lunar\')">음력</div></div>' +
            '<label>생년월일</label><div class="btn-row"><select id="ui-y"></select><select id="ui-m"></select><select id="ui-d"></select></div>' +
            '</div><div class="method-grid"><div class="method-card" onclick="window.executeFlow(\'saju\')"><h2>📜 정밀 사주 분석</h2><p>기질과 재물 흐름 상세 풀이</p></div>' +
            '<div class="method-card" onclick="window.executeFlow(\'tojeong\')"><h2>🗓️ '+currentYear+'년 토정비결</h2><p>올해 상/하반기 승부처 제시</p></div>' +
            '<div class="method-card" onclick="window.renderPage(\'tarot-pick\')"><h2>🃏 타로 무의식 스캔</h2><p>영적 솔루션 도출</p></div></div>';
        } else if (view === 'tarot-pick') {
          html += '<div class="intro-box"><h1>무의식의 거울</h1><p>카드를 선택하십시오.</p></div><div class="tarot-pick">' + '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>'.repeat(3) + '</div>';
        } else if (view === 'result') {
          html += '<div id="loader"><h2>DECODING DESTINY...</h2><div class="p-fill" id="p-fill"></div></div><div id="res-content" style="display:none;"><div class="intro-box"><h1 id="res-title"></h1></div><div id="report-body"></div><button class="btn-run" style="background:#1a1d23; color:#fff; margin-top:40px;" onclick="window.renderPage(\'home\')">처음으로 돌아가기</button></div>';
        }
        html += '</div></div><nav class="nav"><div class="nav-i '+(view==='home'?'on':'')+'" onclick="window.renderPage(\'home\')"><b>🏠</b>홈</div><div class="nav-i" onclick="window.executeFlow(\'saju\')"><b>📜</b>사주</div><div class="nav-i" onclick="window.executeFlow(\'tojeong\')"><b>🗓️</b>토정</div><div class="nav-i" onclick="window.executeFlow(\'tarot\')"><b>🃏</b>타로</div></nav>';
        shadow.innerHTML = html; if (view === 'home') fillSelects();
      };

      window.updateCal = function(t) { state.cal = t; window.renderPage('home'); };
      window.executeFlow = function(type) {
        var n = $('ui-name'); if(n) state.name = n.value; if(!state.name) return alert("성함을 입력하십시오.");
        state.y = $('ui-y').value; state.m = $('ui-m').value; state.d = $('ui-d').value;
        if(type === 'tarot') window.renderPage('tarot-pick'); else window.buildReport(type);
      };

      window.buildReport = function(type) {
        window.renderPage('result');
        var p = 0; var itv = setInterval(function() { p += 10; $('p-fill').style.width = p + '%'; if(p >= 100) { clearInterval(itv); generateText(type); } }, 40);
      };

      async function generateText(type) {
        $('loader').style.display = 'none'; $('res-content').style.display = 'block';
        var sol = Solar.fromYmd(parseInt(state.y), parseInt(state.m), parseInt(state.d));
        var bazi = sol.getLunar().getEightChar(); var myGan = bazi.getDayGan(); var ohaeng = getOhaeng(myGan);
        var seed = state.name.split('').reduce((a,b)=>a+b.charCodeAt(0),0) + sol.getDay();
        $('res-title').innerText = state.name + "님의 운세 리포트";
        
        var reportHTML = "<div class='process-dashboard'><h3>📊 ANALYSIS DATA</h3><p>사주명식: "+bazi.getYearGan()+bazi.getYearZhi()+"년 "+bazi.getMonthGan()+bazi.getMonthZhi()+"월 "+bazi.getDayGan()+bazi.getDayZhi()+"일 ("+ohaeng+")</p></div>";
        var sections = [];
        if(type === 'saju') {
          sections = [
            { t: "🌌 본원의 거울", s: "당신은 "+ohaeng+"의 에너지를 품고 있습니다.", d: "<p>"+ganTraits[myGan[0]]+"</p>" },
            { t: "⏳ 인생 총운", s: "인생의 사계절을 해독합니다.", d: expandDB.lifetimeBase(seed) },
            { t: "💼 재물 테크 전략", s: "가치 창출이 유리합니다.", d: expandDB.wealthBase(seed) },
            { t: "🏥 건강 및 휴식", s: "생체 리듬의 균형이 필요합니다.", d: expandDB.healthBase(seed) },
            { t: "❤️ 대인관계", s: "질적인 밀도에 집중하십시오.", d: expandDB.loveBase(seed) }
          ];
        } else if(type === 'tojeong') {
          var to = tojeongDB[seed % tojeongDB.length];
          sections = [{ t: "📜 괘사 및 총운", s: "「 " + to.h + " 」", d: "<p>" + to.d1 + "</p>" }, { t: "🎯 성공 전략", s: "올해의 승부처 지침입니다.", d: "<p>" + to.d2 + "</p>" }];
        } else if(type === 'star') {
          var sk = getStarSign(sol.getMonth(), sol.getDay());
          sections = [{ t: "✨ "+sk+"자리 매력", s: starTraits[sk] || "비범한 우주 기운", d: "<p>당신만이 가진 고유한 매력 자본을 증명하십시오.</p>" }];
        } else {
          var tk = tarotDB[seed % tarotDB.length];
          sections = [{ t: "🃏 타로 판독: "+tk.n, s: tk.s, d: "<p>"+tk.d+"</p>" }];
        }

        for(var i=0; i<sections.length; i++) {
          reportHTML += '<div class="report-sec" id="rsec-' + i + '"><div class="sec-t">' + sections[i].t + '</div><div class="sum-box">" ' + sections[i].s + ' "</div><div class="det-text" id="rdet-' + i + '"></div></div>';
        }

        // --- 수익화 및 정책 문구 반영 섹션 ---
        var itemMap = {"목(木)":"천연 식물 화분","화(火)":"조명 무드등","토(土)":"가죽 지갑","금(金)":"메탈 시계","수(水)":"텀블러"};
        var selItem = itemMap[ohaeng] || "행운 아이템";

        reportHTML += '<div class="card" style="margin-top:50px; border:1px solid #00f2ff; text-align:center;">' +
          '<h3 style="color:#00f2ff; margin-bottom:15px; font-weight:900;">✨ '+state.name+'님을 위한 개운 비책</h3>' +
          '<div class="sum-box" style="margin-bottom:25px;">오늘의 행운템: <b>'+selItem+'</b></div>' +
          '<a href="https://link.coupang.com/a/erqHD0?q=' + encodeURIComponent(selItem) + '" class="btn-buy" target="_blank">👉 '+selItem+' 최저가 확인하기</a>' +
          '<div class="coupang-disclaimer">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div></div>';

        $('report-body').innerHTML = reportHTML;
        $('app-wrapper').scrollTo({top: 0, behavior: 'smooth'});

        for(var j=0; j<sections.length; j++) {
          $('rdet-' + j).innerHTML = sections[j].d;
          (function(idx) { setTimeout(function() { $('rsec-' + idx).classList.add('show'); }, idx * 250); })(j);
        }
      }

      function fillSelects() {
        var sy = $('ui-y'), sm = $('ui-m'), sd = $('ui-d');
        for(var i=currentYear; i>=1940; i--) sy.add(new Option(i+'년', i)); sy.value = state.y;
        for(var i=1; i<=12; i++) sm.add(new Option(i+'월', i)); sm.value = state.m;
        for(var i=1; i<=31; i++) sd.add(new Option(i+'일', i)); sd.value = state.d;
      }
      function initApp() { if (typeof Lunar === 'undefined') { setTimeout(initApp, 100); return; } window.renderPage('home'); }
      initApp();
    })();
  </script>
</body>
