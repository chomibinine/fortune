<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>운명 리포트</title>
<style>
body{
margin:0;
font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
background:radial-gradient(circle at top,#141427,#07070f);
color:#eaeaf2;
}
.container{max-width:920px;margin:0 auto;padding:18px;}
.header{text-align:center;padding:28px 10px;}
.header h1{font-size:28px;margin:0;letter-spacing:-1px;}
.header p{opacity:0.6;margin-top:8px;font-size:13px;}
.card{
background:linear-gradient(145deg,#19192b,#10101c);
border:1px solid rgba(255,255,255,0.06);
border-radius:18px;
padding:16px;
margin:12px 0;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
input,select{
width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;background:#0f0f1a;color:#fff;
}
button{
width:100%;padding:14px;margin-top:14px;border:none;border-radius:14px;font-weight:bold;cursor:pointer;
background:linear-gradient(90deg,#7f5af0,#2cb67d);color:#fff;
box-shadow:0 0 18px rgba(127,90,240,0.35);
}
.title{font-size:15px;color:#c9b6ff;margin-bottom:8px;}
.result{white-space:pre-line;line-height:1.75;font-size:14px;color:#e5e5f5;}
.summary{font-size:15px;line-height:1.7;background:rgba(127,90,240,0.08);padding:12px;border-radius:12px;border-left:3px solid #7f5af0;}
.hidden{display:none;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr;}}
.badge{display:inline-block;padding:4px 8px;font-size:12px;border-radius:999px;background:rgba(44,182,125,0.15);color:#2cb67d;margin-bottom:8px;}
.cta{position:sticky;bottom:0;background:#0b0b14;padding:12px;border-top:1px solid rgba(255,255,255,0.06);}
.cta button{background:linear-gradient(90deg,#ffb86b,#ff7a90);color:#1a1a1a;}
.small{font-size:12px;opacity:0.6;}
</style>
</head>
<body>
<div class="container">

<div class="header">
<h1>🔮 운명 리포트</h1>
<p>사주 · 토정 · 별자리 · 타로 통합 분석 시스템</p>
</div>

<div class="card">
<div class="title">기본 정보 입력</div>
<input id="name" placeholder="이름" />
<input id="birth" type="date" />
<select id="gender"><option value="M">남성</option><option value="F">여성</option></select>
<button onclick="runAll()">내 운명 분석하기</button>
</div>

<div id="resultArea" class="hidden">

<div class="card">
<div class="badge">핵심 요약</div>
<div id="summary" class="summary"></div>
</div>

<div class="card">
<div class="title">사주 분석 (종합)</div>
<div id="saju" class="result"></div>
</div>

<div class="grid">
<div class="card"><div class="title">토정비결</div><div id="tojeong" class="result"></div></div>
<div class="card"><div class="title">별자리</div><div id="zodiac" class="result"></div></div>
<div class="card"><div class="title">타로</div><div id="tarot" class="result"></div></div>
</div>

<div class="card"><div class="title">인생 흐름 해석</div><div id="flow" class="result"></div></div>

</div>

<div class="cta"><button onclick="scrollTopBtn()">다시 보기</button></div>
</div>

<script>

function pick(arr,seed){return arr[seed%arr.length];}
function hash(str){let h=0;for(let i=0;i<str.length;i++){h=(h<<5)-h+str.charCodeAt(i);h|=0;}return Math.abs(h);}

const engine={
emotion:["안정과 변화 공존","내부 긴장 증가","전환 직전 상태"],
risk:["충동 결정 위험","감정 판단 주의","외부 변수 영향 큼"],
advice:["속도 조절","장기 관점 유지","재검토 필요"],
change:["구조 변화 진행","흐름 재정렬","선택이 결과 결정"]
};

function saju(name,birth){
let s=hash(name+birth);

let wealth=["재물 흐름은 안정적이나 급격한 상승보다는 축적형 구조","수입보다 지출 관리가 핵심","기회는 중기 이후 강화" ];
let love=["관계는 신중하게 발전하는 구조","초기 열정보다 안정적 관계 중요","인연은 늦게 깊어지는 타입"];
let health=["스트레스 누적 주의","체력보다 정신 피로 관리 중요","생활 리듬이 건강을 좌우"];
let life=["초년: 기반 형성","중년: 선택과 확장","말년: 안정 구조"];

return `종합 사주 분석\n\n[성향]\n안정 기반 + 변화 가능성 구조\n\n[초년/중년/말년]\n${life.join(" | ")}\n\n[재물운]\n${pick(wealth,s)}\n\n[연애운]\n${pick(love,s+1)}\n\n[건강운]\n${pick(health,s+2)}\n\n[현재 흐름]\n${pick(engine.change,s)}\n\n[조언]\n${pick(engine.advice,s)}`;
}

function tojeong(){let g=["건","곤","태","비","둔","몽"];let s=Math.random()*100|0;
return `괘: ${g[s%6]}\n\n${pick(engine.change,s)}\n${pick(engine.advice,s+1)}`;}

function zodiac(){let s=Math.random()*100|0;
return `${pick(engine.emotion,s)}\n${pick(engine.risk,s+1)}`;}

function tarot(){let c=["Fool","Sun","Tower","Star"];let s=Math.random()*100|0;
return `카드: ${c[s%4]}\n\n${pick(engine.change,s)}\n${pick(engine.advice,s+1)}`;}

function flow(){let s=Math.random()*100|0;
return `인생 흐름 지수: ${s}\n\n${pick(engine.change,s)}\n${pick(engine.emotion,s+1)}`;}

function runAll(){let n=name.value,b=birth.value;if(!b)return alert('입력');
resultArea.classList.remove('hidden');
summary.innerText="현재 인생 구조는 변화 직전 단계입니다.";
saju.innerText=saju(n,b);
tojeong.innerText=tojeong();
zodiac.innerText=zodiac();
tarot.innerText=tarot();
flow.innerText=flow();
}

function scrollTopBtn(){window.scrollTo({top:0,behavior:'smooth'});}

</script>
</body>
</html>
