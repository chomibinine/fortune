<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명의 나침반 - 프리미엄 정통 운세 포털</title>
    <meta name="description" content="무료 정통 사주, 타로, 별자리 분석 서비스. 당신의 무의식과 우주적 흐름을 정밀하게 투영하는 운명의 나침반입니다.">
    <!-- 정통 천문 역법 계산 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg-deep: #05070a;
            --bg-gradient: radial-gradient(circle at top right, #0d121d 0%, #05070a 100%);
            --card-glass: rgba(13, 17, 23, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2ff;
            --premium-gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --gold-text: #ffd700;
            --text-main: #adbac7;
            --white: #ffffff;
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            background: var(--bg-deep); 
            background-image: var(--bg-gradient);
            color: var(--text-main); 
            line-height: 1.9; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .app-container { max-width: 700px; margin: 0 auto; padding: 0 20px 140px; }

        /* --- Elegant Header --- */
        .header { text-align: center; padding: 80px 0 50px; }
        .header h1 { 
            color: #fff;
            font-size: 2.6rem; 
            font-weight: 900; 
            letter-spacing: 10px; 
            margin: 0; 
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }
        .header p { 
            margin-top: 15px; 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* --- Premium Cards --- */
        .card { 
            background: var(--card-glass); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--card-border); 
            border-radius: 35px; 
            padding: 40px; 
            margin-bottom: 35px; 
            box-shadow: var(--shadow-soft);
        }
        label { display: block; margin-bottom: 12px; font-weight: 800; color: var(--accent-cyan); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; }
        input, select { 
            width: 100%; 
            padding: 20px; 
            border-radius: 18px; 
            border: 1px solid var(--card-border); 
            background: rgba(0, 0, 0, 0.4); 
            color: #fff; 
            font-size: 1.05rem; 
            margin-bottom: 25px; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        input:focus, select:focus { border-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.25); }
        .select-row { display: flex; gap: 12px; margin-bottom: 10px; }
        .select-row select { margin-bottom: 15px; }

        /* --- Menu Grid --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 60px; }
        .menu-item { 
            background: var(--card-glass); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); 
            border-radius: 30px; 
            padding: 45px 25px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.4s ease; 
        }
        .menu-item:hover { 
            border-color: var(--accent-cyan); 
            transform: translateY(-10px);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.1);
        }
        .menu-item b { font-size: 3rem; display: block; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4)); }
        .menu-item h3 { margin: 0; font-size: 1.2rem; color: #fff; font-weight: 800; }
        .menu-item p { margin: 10px 0 0; font-size: 0.85rem; color: var(--text-muted); }

        /* --- Reports Section --- */
        #result-view, #tarot-pick-view { display: none; animation: slideUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .sec-title { 
            font-size: 1.6rem; color: #fff; font-weight: 900; margin: 70px 0 25px; 
            display: flex; align-items: center; gap: 15px; 
        }
        .sec-title::before { 
            content: ''; width: 5px; height: 28px; 
            background: var(--premium-gold); border-radius: 10px; 
            box-shadow: 0 0 20px #f6d365;
        }

        .summary-box { 
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12) 0%, rgba(255, 215, 0, 0.02) 100%); 
            border: 1px solid rgba(255, 215, 0, 0.25); 
            border-radius: 28px; padding: 40px; margin-bottom: 40px; 
            color: var(--gold-text); font-weight: 800; text-align: center; 
            font-size: 1.3rem; line-height: 1.7;
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.08);
        }
        
        .principle-box { 
            background: rgba(0, 242, 255, 0.04); 
            border-left: 4px solid var(--accent-cyan); 
            padding: 22px 30px; margin-bottom: 40px; 
            font-size: 1rem; color: var(--accent-cyan); 
            line-height: 1.8; font-style: italic;
        }

        .detail-text { font-size: 1.15rem; line-height: 2.3; color: var(--text-main); text-align: justify; word-break: keep-all; }
        .detail-text h4 { color: var(--white); font-size: 1.3rem; margin: 40px 0 15px; border-left: 3px solid var(--accent-cyan); padding-left: 15px; }
        .detail-text p { margin-bottom: 35px; }
        .detail-text b { color: #fff; font-weight: 900; }

        /* --- Saju Pillars --- */
        .pillar-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .pillar { 
            background: rgba(0, 0, 0, 0.5); 
            padding: 25px 5px; border-radius: 25px; 
            text-align: center; border: 1px solid var(--card-border); 
            transition: 0.4s;
        }
        .pillar span { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 800; }
        .pillar b { font-size: 1.6rem; color: var(--accent-cyan); text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        .pillar-desc { font-size: 0.95rem; color: var(--text-muted); text-align: center; margin-bottom: 50px; line-height: 1.9; }

        /* --- Monthly List --- */
        .month-item { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--card-border); 
            border-radius: 25px; padding: 35px; margin-bottom: 25px;
            transition: 0.3s;
        }
        .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-title { color: #fff; font-weight: 900; font-size: 1.3rem; }
        .month-luck { color: var(--accent-cyan); font-size: 0.95rem; font-weight: 900; background: rgba(0, 242, 255, 0.12); padding: 5px 15px; border-radius: 25px; }

        /* --- Tarot Visual --- */
        .tarot-spread { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; justify-items: center; }
        .tarot-card-back { 
            width: 100%; max-width: 110px; aspect-ratio: 2/3.3; 
            background: linear-gradient(135deg, #1c2331, #0a0e14); 
            border: 2px solid var(--card-border); 
            border-radius: 15px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
        }
        .tarot-card-back:hover { transform: translateY(-15px) scale(1.05); border-color: var(--accent-cyan); box-shadow: 0 20px 40px rgba(0, 242, 255, 0.25); }
        .tarot-card-back.selected { opacity: 0; pointer-events: none; }
        
        .tarot-visual { 
            width: 180px; height: 280px; margin: 0 auto 30px; 
            background: linear-gradient(135deg, #1c2331, #05070a); 
            border: 5px solid var(--gold-text); border-radius: 28px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 0 50px rgba(255,215,0,0.2); position: relative; 
        }
        .tarot-visual b { font-size: 6rem; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--gold-text)); }
        .tarot-visual span { color: var(--gold-text); font-weight: 900; font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; }

        /* --- Lucky Action Box --- */
        .action-box { 
            margin-top: 120px; padding: 55px 40px; border-radius: 45px; 
            background: linear-gradient(180deg, rgba(13, 17, 23, 0.95) 0%, rgba(5, 7, 10, 1) 100%); 
            border: 1px solid var(--accent-cyan); text-align: center; 
            box-shadow: 0 30px 80px rgba(0, 242, 255, 0.15);
        }
        .action-box h2 { color: var(--accent-cyan); font-size: 1.8rem; margin: 0 0 40px; font-weight: 900; letter-spacing: 2px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .action-item { background: rgba(0,0,0,0.5); border: 1px solid var(--card-border); border-radius: 28px; padding: 30px 15px; }
        .action-item .label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; font-weight: 800; text-transform: uppercase; }
        .action-item .value { font-size: 1.2rem; color: var(--gold-text); font-weight: 900; }
        
        .reason-box { 
            background: rgba(0, 242, 255, 0.05); border-radius: 25px; 
            padding: 30px; margin-bottom: 50px; font-size: 1.1rem; 
            line-height: 1.9; color: var(--text-main); text-align: left; 
            border-left: 5px solid var(--accent-cyan);
        }

        /* --- Premium Button --- */
        .btn-buy { 
            display: inline-block; 
            background: linear-gradient(135deg, #00f2ff 0%, #007bff 100%);
            color: #000; padding: 25px 60px; border-radius: 22px; 
            text-decoration: none; font-weight: 900; font-size: 1.4rem; 
            box-shadow: 0 20px 45px rgba(0, 242, 255, 0.35); 
            transition: all 0.4s ease; width: 100%; text-align: center; 
        }
        .btn-buy:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 25px 55px rgba(0, 242, 255, 0.45); filter: brightness(1.15); }
        .disclaimer { font-size: 0.8rem; color: #4e5561; margin-top: 40px; line-height: 1.7; padding: 0 30px; }

        /* --- Bottom Nav --- */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px; 
            background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(30px); 
            border-top: 1px solid var(--card-border); 
            display: flex; justify-content: space-around; align-items: center; z-index: 9999; 
        }
        .nav-item { color: #5c6370; text-align: center; font-size: 0.75rem; font-weight: 800; cursor: pointer; text-decoration: none; flex: 1; transition: 0.4s; }
        .nav-item.active { color: var(--accent-cyan); }
        .nav-item i { font-size: 1.8rem; font-style: normal; display: block; margin-bottom: 7px; }

        /* --- Loader --- */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { 
            width: 80px; height: 80px; 
            border: 5px solid rgba(0, 242, 255, 0.1); 
            border-top-color: var(--accent-cyan); 
            border-radius: 50%; animation: spin 1s infinite cubic-bezier(0.5, 0, 0.5, 1); 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .visitor-count { text-align: center; padding: 40px; font-size: 0.9rem; color: var(--text-muted); letter-spacing: 1.5px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="color: var(--accent-cyan); margin-top: 35px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; font-size: 0.9rem;">Analysing Cosmic Coordinates...</p>
</div>

<div class="app-container">
    <div id="home-view">
        <header class="header">
            <h1>운명의 나침반</h1>
            <p>Premium Astronomical Fate Report</p>
        </header>

        <div class="card">
            <label>상담 대상 성함</label>
            <input type="text" id="user-name" placeholder="이름을 입력하세요">
            
            <label>생년월일</label>
            <div class="select-row">
                <select id="user-year"></select>
                <select id="user-month"></select>
                <select id="user-day"></select>
            </div>

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>성별</label>
                    <select id="user-gender">
                        <option value="male">남성(陽)</option>
                        <option value="female">여성(陰)</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>력 체계</label>
                    <select id="user-cal">
                        <option value="solar">양력(太陽曆)</option>
                        <option value="lunar">음력(太陰曆)</option>
                    </select>
                </div>
            </div>

            <label>태어난 시각</label>
            <select id="user-time">
                <option value="none">모름 / 미정</option>
                <option value="0">자시 (23:30 ~ 01:29)</option><option value="2">축시 (01:30 ~ 03:29)</option>
                <option value="4">인시 (03:30 ~ 05:29)</option><option value="6">묘시 (05:30 ~ 07:29)</option>
                <option value="8">진시 (07:30 ~ 09:29)</option><option value="10">사시 (09:30 ~ 11:29)</option>
                <option value="12">오시 (11:30 ~ 13:29)</option><option value="14">미시 (13:30 ~ 15:29)</option>
                <option value="16">신시 (15:30 ~ 17:29)</option><option value="18">유시 (17:30 ~ 19:29)</option>
                <option value="20">술시 (19:30 ~ 21:29)</option><option value="22">해시 (21:30 ~ 23:29)</option>
            </select>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="handleStart('saju')"><b>🧭</b><h3>정통 사주 분석</h3><p>심층 팔자 리포트</p></div>
            <div class="menu-item" onclick="handleStart('tojeong')"><b>📜</b><h3>토정비결</h3><p>연간 및 월별 상세운</p></div>
            <div class="menu-item" onclick="handleStart('star')"><b>✨</b><h3>별자리 심리</h3><p>우주적 기질 분석</p></div>
            <div class="menu-item" onclick="handleStart('tarot')"><b>🃏</b><h3>타로 무의식</h3><p>3장 스프레드 리딩</p></div>
        </div>

        <div class="visitor-count" id="visitor-ui"></div>
    </div>

    <!-- Tarot Picker -->
    <div id="tarot-pick-view">
        <header class="header" style="padding: 40px 0 30px;"><h1>무의식의 거울</h1><p>마음을 정돈하고 카드 3장을 고르세요.</p></header>
        <div class="principle-box">타로의 동시성 원리는 '우연한 선택'이 당신의 무의식과 우주적 흐름이 만나는 지점을 정밀하게 투영합니다.</div>
        <div style="text-align:center; color:var(--accent-cyan); margin-bottom:25px; font-weight:900; font-size: 1rem;" id="tarot-count-info">3장 중 0장 선택됨</div>
        <div class="tarot-spread" id="tarot-spread-area"></div>
        <button class="btn-buy" style="background: var(--card-glass); color: #fff; margin-top: 40px; box-shadow: none;" onclick="location.reload()">처음으로 돌아가기</button>
    </div>

    <div id="result-view">
        <div id="report-content"></div>
        <button class="btn-buy" style="background: var(--card-glass); color: #fff; margin-top: 50px; box-shadow: none;" onclick="location.reload()">홈으로 돌아가기</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="location.reload()"><i>🏠</i>홈</div>
    <div class="nav-item" onclick="handleStart('saju')"><i>🧭</i>사주</div>
    <div class="nav-item" onclick="handleStart('tojeong')"><i>📜</i>토정</div>
    <div class="nav-item" onclick="handleStart('star')"><i>✨</i>별자리</div>
    <div class="nav-item" onclick="handleStart('tarot')"><i>🃏</i>타로</div>
</nav>

<script>
    // --- Contents DB (심층/방대하게 확장) ---
    const sajuData = {
        personality: (gan) => `
            <h4>천부적인 기질의 원형</h4>
            <p>귀하의 명식에서 가장 빛나는 태양과 같은 존재인 <b>일간(${gan})</b>은 당신의 영혼 그 자체입니다. 명리학의 정통 이론에 따르면 일간은 세상을 살아가는 원동력이자, 외부의 정보를 걸러내는 필터와 같습니다. 당신의 구조는 <b>자기 주도적 에너지</b>가 매우 강력하게 설계되어 있습니다. 이는 단순히 고집이 센 것이 아니라, 자신만의 가치 체계가 확고하여 대중의 유행이나 타인의 시선에 쉽게 영혼을 팔지 않는 고결함을 의미합니다.</p>
            <h4>지적 매커니즘과 직관</h4>
            <p>당신은 논리적 분석과 비범한 직관이라는 양날의 검을 모두 소유하고 있습니다. 겉으로는 유연하고 사교적인 모습을 보이지만, 내면에는 누구도 침범할 수 없는 서늘한 이성이 자리 잡고 있습니다. 남들이 보지 못하는 미세한 틈새를 발견하는 관찰력이 뛰어나며, 복잡한 문제를 단순화하여 해결책을 제시하는 설계가적 기질이 돋보입니다. 이러한 기질은 전문 분야에서 독보적인 위치에 오르게 하는 핵심 자산이 됩니다.</p>
            <h4>사회적 발현과 페르소나</h4>
            <p>조직 내에서 당신은 신뢰의 아이콘입니다. 맡은 바 책임을 다하면서도 전체의 흐름을 읽는 안목이 있어 리더 혹은 핵심 참모로서의 역할을 완벽히 수행합니다. 다만, 완벽주의적 성향이 강해 스스로를 채찍질하는 경향이 있으니, 가끔은 자신에게 '불완전할 자유'를 허락하는 것이 정신적 풍요를 유지하는 비책입니다.</p>
        `,
        early: `
            <h4>씨앗이 대지를 뚫는 고난과 축복</h4>
            <p>인생의 봄에 해당하는 초년운(만 20대 후반까지)은 당신의 그릇을 결정짓는 <b>담금질의 시간</b>입니다. 명리학적으로 이 시기는 '근(根)'을 내리는 과정이며, 때로는 거센 비바람과 같은 환경적 변화를 겪었을 가능성이 큽니다. 하지만 명심하십시오. 당신이 겪은 시행착오는 실패가 아니라 중년의 폭발적 비상을 위한 '데이터 축적' 과정이었습니다.</p>
            <p>초년의 당신은 독립심이 남달랐을 것입니다. 남의 도움을 받기보다 스스로 길을 개척하려는 에너지가 강하게 발현되었으며, 이 과정에서 축적된 지혜와 맷집은 훗날 그 어떤 자본보다 강력한 무기가 됩니다. 학문적 성취나 자격 획득에 유리한 운로를 가졌으니, 이 시기에 쌓은 지식은 평생의 연금이 될 것입니다.</p>
        `,

                { item: '무드등 조명', dir: '정남쪽', color: '버건디', reason: '명예와 빛을 상징하는 화의 에너지를 보강합니다. 따스한 조명은 당신의 가치를 세상에 더 밝게 드러내는 자석 역할을 하여 성공을 앞당깁니다.' },
                { item: '붉은색 카드 지갑', dir: '남쪽', color: '레드', reason: '열정을 금전운으로 치환합니다. 붉은 색상은 재물의 유출을 막고 강력한 성취 욕구를 자극하는 당신만의 최고의 개운 비책입니다.' }
            ],
            '토(土)': [
                { item: '천연 가죽 소품', dir: '중앙', color: '옐로우', reason: '안정과 수용을 뜻하는 토의 에너지는 가죽 소재와 환상의 궁합입니다. 흔들리는 마음을 잡아주고 재물을 묵직하게 쌓아주는 기반을 형성합니다.' },
                { item: '세라믹 오브제', dir: '동북쪽', color: '베이지', reason: '흙을 구운 도자기는 신뢰의 기운을 보강합니다. 공간에 배치하는 것만으로도 안정적인 운의 흐름을 만들어내어 가정과 일의 화합을 돕습니다.' }
            ],
            '금(金)': [
                { item: '메탈 프레임 시계', dir: '정서쪽', color: '실버', reason: '금속의 단호함이 당신의 결단력을 높여줍니다. 시계의 정밀함은 흐트러진 일상의 운을 바로잡고 목표를 향한 정확한 타격을 돕는 필수템입니다.' },
                { item: '스테인리스 텀블러', dir: '북서쪽', color: '그레이', reason: '견고한 금속 소재는 당신의 본질적 기운을 완벽히 보호합니다. 과열된 에너지를 조절하여 실리를 챙기는 냉철한 판단력을 유지시켜 줍니다.' }
            ],
            '수(水)': [
                { item: '초음파 가습기', dir: '정북쪽', color: '딥 블랙', reason: '지혜를 뜻하는 수의 기운은 촉촉한 습도에서 완성됩니다. 가습기는 당신의 유연한 사고와 위기 대처 능력을 길러주는 핵심 개운 요소입니다.' },
                { item: '수분 크림 세트', dir: '북서쪽', color: '블루', reason: '수분을 공급하는 행위는 본질적 에너지를 채우는 신성한 의식입니다. 피부의 윤기가 곧 운의 윤기가 되어 당신에게 귀한 소식을 가져올 것입니다.' }
            ]
        };
        const pool = itemPool[ohaeng] || itemPool['토(土)'];
        const selected = pool[seed % pool.length];
        return { ...selected, num: (seed % 9) + 1 };
    }

    // --- Core Logic ---
    async function handleStart(type) {
        const nameInput = document.getElementById('user-name');
        if (!nameInput || !nameInput.value) return alert("성함을 입력해 주세요.");

        if(type === 'tarot') {
            tarotChoices = [];
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('tarot-pick-view').style.display = 'block';
            renderDeck();
            window.scrollTo(0, 0);
            return;
        }

        document.getElementById('loader').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            renderFinalReport(type, calculateBaseData());
        }, 2200);
    }

    function renderDeck() {
        const area = document.getElementById('tarot-spread-area');
        area.innerHTML = '';
        for(let i=0; i<16; i++) {
            const c = document.createElement('div');
            c.className = 'tarot-card-back';
            c.innerHTML = '🔮';
            c.id = `t-card-${i}`;
            c.onclick = () => pickTarot(i);
            area.appendChild(c);
        }
        document.getElementById('tarot-count-info').innerText = '3장 중 0장 선택됨';
    }

    function pickTarot(i) {
        if(tarotChoices.includes(i)) return;
        tarotChoices.push(i);
        document.getElementById(`t-card-${i}`).classList.add('selected');
        document.getElementById('tarot-count-info').innerText = `3장 중 ${tarotChoices.length}장 선택됨`;

        if(tarotChoices.length === 3) {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('tarot-pick-view').style.display = 'none';
                document.getElementById('result-view').style.display = 'block';
                const d = calculateBaseData();
                d.tarotRes = tarotChoices.map(idx => tarotCards[idx % tarotCards.length]);
                renderFinalReport('tarot', d);
            }, 1800);
        }
    }

    function calculateBaseData() {
        const n = document.getElementById('user-name').value;
        const y = document.getElementById('user-year').value;
        const m = document.getElementById('user-month').value;
        const d = document.getElementById('user-day').value;
        const h = document.getElementById('user-time').value;
        let hour = h === 'none' ? 12 : parseInt(h);
        const sol = Solar.fromYmdHms(parseInt(y), parseInt(m), parseInt(d), hour, 0, 0);
        const bazi = sol.getLunar().getEightChar();
        const oh = getOhaeng(bazi.getDayGan());
        const seed = n.length + parseInt(d) + parseInt(m);
        return { name: n, bazi, ohaeng: oh, luck: getLuckSet(oh, seed), seed, sol };
    }
