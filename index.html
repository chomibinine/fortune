<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정통 사주 분석</title>

<style>
body {
  margin:0;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  text-align:center;
}

.container {
  padding:40px;
}

h1 {
  font-size:32px;
}

input, button {
  padding:12px;
  margin:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}

.result {
  margin-top:30px;
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:12px;
}

.counter {
  margin-top:20px;
  font-size:14px;
  opacity:0.8;
}

a.btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  background:#ffcc00;
  color:#000;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🔮 정통 사주 분석</h1>

<input type="date" id="birth">
<input type="time" id="time">
<br>
<button onclick="analyze()">내 사주 보기</button>

<div class="counter">
👀 오늘 방문자: <span id="today"></span> / 총 방문자: <span id="total"></span>
</div>

<div class="result" id="result"></div>

</div>

<script>

// ---------------- 방문자 카운터 (localStorage)
// ----------------
let todayKey = new Date().toDateString();

let total = localStorage.getItem("total") || 0;
let today = localStorage.getItem(todayKey) || 0;

total++;
today++;

localStorage.setItem("total", total);
localStorage.setItem(todayKey, today);

document.getElementById("total").innerText = total;
document.getElementById("today").innerText = today;

// ---------------- 사주 기본 데이터
// ----------------
const stems = ["갑","을","병","정","무","기","경","신","임","계"];
const branches = ["자","축","인","묘","진","사","오","미","신","유","술","해"];

const elementMap = {
  "갑":"목","을":"목","병":"화","정":"화",
  "무":"토","기":"토","경":"금","신":"금",
  "임":"수","계":"수"
};

// ---------------- 기본 함수
// ----------------
function adjustYear(date){
  let y=date.getFullYear(), m=date.getMonth()+1, d=date.getDate();
  if(m<2 || (m===2 && d<4)) return y-1;
  return y;
}

function getYearPillar(year){
  return stems[(year-4)%10] + branches[(year-4)%12];
}

function getDayPillar(date){
  let base=new Date(1900,0,1);
  let diff=Math.floor((date-base)/(1000*60*60*24));
  let i=diff%60;
  return stems[i%10]+branches[i%12];
}

function getHourBranch(hour){
  return branches[Math.floor((hour+1)/2)%12];
}

function getHourStem(dayStemIndex, hourBranchIndex){
  return stems[(dayStemIndex*2 + hourBranchIndex)%10];
}

// ---------------- 오행 계산
// ----------------
function countElements(pillars){
  let c={목:0,화:0,토:0,금:0,수:0};
  pillars.forEach(p=>{
    c[elementMap[p[0]]]++;
  });
  return c;
}

// ---------------- 해석 생성
// ----------------
function generateText(dayElement, elements){

  let min = Object.keys(elements).reduce((a,b)=>elements[a]<elements[b]?a:b);

  let text = `
  당신은 <b>${dayElement}</b> 기운 중심의 사주입니다.<br><br>
  이 기운은 삶의 방향성과 성격을 결정짓는 핵심 요소입니다.<br><br>

  현재 사주에서 <b>${min}</b> 기운이 부족합니다.<br>
  이로 인해 특정 상황에서 불균형이 발생할 수 있습니다.<br><br>
  `;

  if(min==="수"){
    text += "감정 소모, 피로 누적, 집중력 저하로 이어질 수 있습니다.<br>";
  }
  if(min==="금"){
    text += "결단력 부족, 정리력 저하로 이어질 수 있습니다.<br>";
  }

  text += `
  <br>
  👉 이 부족한 기운을 보완하는 것이 중요합니다.
  `;

  return {text, min};
}

// ---------------- 실행
// ----------------
function analyze(){

  let date=new Date(document.getElementById("birth").value);
  let hour=parseInt(document.getElementById("time").value.split(":")[0]);

  let year=getYearPillar(adjustYear(date));
  let day=getDayPillar(date);

  let dayStemIndex=stems.indexOf(day[0]);

  let hBranch=getHourBranch(hour);
  let hIndex=branches.indexOf(hBranch);
  let hStem=getHourStem(dayStemIndex,hIndex);

  let hourPillar=hStem+hBranch;

  let pillars=[year,day,hourPillar];

  let elements=countElements(pillars);
  let dayElement=elementMap[day[0]];

  let {text,min}=generateText(dayElement,elements);

  document.getElementById("result").innerHTML = `
    <b>📌 연주:</b> ${year}<br>
    <b>📌 일주:</b> ${day}<br>
    <b>📌 시주:</b> ${hourPillar}<br><br>

    <b>🌿 오행:</b> 
    목:${elements.목} 화:${elements.화} 토:${elements.토} 금:${elements.금} 수:${elements.수}
    <br><br>

    ${text}

    <br><br>

    <a class="btn" href="https://link.coupang.com/a/erylCA" target="_blank">
    👉 당신에게 필요한 행운 아이템 보기
    </a>
  `;
}

</script>

</body>
</html>
