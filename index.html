<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>운세 통합 플랫폼</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#0b0b16,#14142a);
color:#fff;
}
.container{max-width:900px;margin:0 auto;padding:16px;}
.header{
text-align:center;
padding:20px 0;
}
.header h1{font-size:26px;margin:0;}
.sub{opacity:0.7;font-size:13px;margin-top:6px;}
.card{
background:#1b1b2a;
border-radius:16px;
padding:16px;
margin:12px 0;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:15px;
}
button{
background:linear-gradient(90deg,#6c5ce7,#8e44ad);
color:#fff;
font-weight:bold;
cursor:pointer;
}
button:hover{opacity:0.9;}
.hidden{display:none;}
.result{
white-space:pre-line;
line-height:1.6;
font-size:14px;
}
.section-title{
font-size:16px;
margin-bottom:8px;
color:#d0cfff;
}
.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}
@media(min-width:768px){
.grid{grid-template-columns:1fr 1fr;}
}
.cta-fixed{
position:sticky;
bottom:0;
background:#0f0f1a;
padding:12px;
border-top:1px solid #2a2a44;
}
.cta-btn{
background:#00d2ff;
color:#000;
font-weight:bold;
border-radius:12px;
}
.small{
font-size:12px;
opacity:0.7;
}
.reveal{
background:#2a2a44;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🔮 당신의 운명 리포트</h1>
<div class="sub">사주 · 토정비결 · 별자리 · 타로 통합 분석</div>
</div>

<div class="card" id="inputCard">
<div class="section-title">기본 정보 입력</div>
<input id="name" placeholder="이름" />
<input id="birth" type="date" />
<select id="gender">
<option value="M">남성</option>
<option value="F">여성</option>
</select>
<button onclick="runAll()">🔮 내 운명 분석 시작</button>
</div>

<div id="resultArea" class="hidden">

<div class="card">
<div class="section-title">📌 당신의 핵심 운세</div>
<div id="summary" class="result"></div>
</div>

<div class="grid">
<div class="card">
<div class="section-title">사주 분석</div>
<div id="saju" class="result"></div>
</div>

<div class="card">
<div class="section-title">토정비결</div>
<div id="tojeong" class="result"></div>
</div>

<div class="card">
<div class="section-title">별자리</div>
<div id="zodiac" class="result"></div>
</div>

<div class="card">
<div class="section-title">타로</div>
<div id="tarot" class="result"></div>
</div>
</div>

<div class="card">
<div class="section-title">📊 인생 흐름</div>
<div id="flow" class="result"></div>
</div>

<div class="card hidden" id="affiliateBox">
<div class="section-title">🎯 운세 강화 아이템</div>
<div class="small">당신의 운 흐름을 보완하는 추천</div>
<div id="affiliate"></div>
</div>

<div class="reveal" onclick="showAffiliate()">
👉 추가 운세 해석 보기
</div>

</div>

<div class="cta-fixed">
<button class="cta-btn" onclick="scrollToTop()">🔄 다시 보기</button>
</div>

</div>

<script>

// 간단 카운터
let today=Number(localStorage.getItem('t')||0);
let total=Number(localStorage.getItem('a')||0);
today++;total++;
localStorage.setItem('t',today);
localStorage.setItem('a',total);

function saju(name,birth){
let d=new Date(birth);
return name+"님의 흐름은 안정과 변화가 공존하는 구조입니다.";
}

function tojeong(){
let arr=["건","곤","태","비","대유","둔"];
return "괘: "+arr[Math.floor(Math.random()*arr.length)]+"\n현재 변화 구간입니다.";
}

function zodiac(date){
return "별자리 기반 감정 흐름 안정/변동 혼합";
}

function tarot(){
let arr=["Fool","Sun","Tower","Star"];
return "카드: "+arr[Math.floor(Math.random()*arr.length)];
}

function runAll(){
let name=document.getElementById('name').value;
let birth=document.getElementById('birth').value;
if(!birth)return alert('입력 필요');

// 화면 전환
document.getElementById('resultArea').classList.remove('hidden');

// 핵심 요약 (전환 핵심)
document.getElementById('summary').innerText=
"당신은 현재 중요한 선택의 분기점에 있습니다.\n기회와 변화가 동시에 작용하는 시기입니다.";

// 결과
document.getElementById('saju').innerText=saju(name,birth);
document.getElementById('tojeong').innerText=tojeong();
document.getElementById('zodiac').innerText=zodiac(birth);
document.getElementById('tarot').innerText=tarot();

// 흐름
let v=Math.random()*100;
document.getElementById('flow').innerText=
"10년 흐름 지수: "+v.toFixed(1)+"\n(상승/정체/전환 혼합 패턴)";
}

function showAffiliate(){
document.getElementById('affiliateBox').classList.remove('hidden');
document.getElementById('affiliate').innerHTML=
'<a href="https://link.coupang.com/a/erylCA" target="_blank">👉 당신의 운을 보완하는 아이템 보기</a>';
}

function scrollToTop(){
window.scrollTo({top:0,behavior:'smooth'});
}

</script>

</body>
</html>
