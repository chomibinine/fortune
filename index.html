<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>운세 통합 플랫폼</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f1a;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 24px;
    font-size: 22px;
    font-weight: bold;
    background: #1b1b2e;
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
  }

  .input-box {
    background: #1c1c2f;
    padding: 20px;
    border-radius: 12px;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
  }

  .btn-group {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 15px;
  }

  button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #6c5ce7;
    color: white;
    font-weight: bold;
  }

  button:hover {
    background: #836fff;
  }

  .result {
    margin-top: 20px;
    padding: 20px;
    background: #141427;
    border-radius: 12px;
    min-height: 120px;
  }

  .card {
    background: #222244;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
  }

  footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    color: #aaa;
  }

  .affiliate {
    margin-top: 20px;
    padding: 15px;
    background: #2a1f3d;
    border-radius: 10px;
    display: none;
  }

  @media (max-width: 600px) {
    .btn-group {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<header>
  운세 통합 플랫폼 (사주 · 토정비결 · 타로 · 별자리)
</header>

<div class="container">

  <!-- 입력 영역 -->
  <div class="input-box">
    <label>이름</label>
    <input type="text" id="name" placeholder="이름 입력">

    <label>생년월일</label>
    <input type="date" id="birthdate">

    <label>출생시간 (선택)</label>
    <input type="time" id="birthtime">

    <div class="btn-group">
      <button onclick="runFortune('saju')">사주 보기</button>
      <button onclick="runFortune('tojeong')">토정비결</button>
      <button onclick="runFortune('tarot')">타로</button>
      <button onclick="runFortune('zodiac')">별자리</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="result" id="result">
    결과가 여기에 표시됩니다.
  </div>

  <!-- 추천 영역 (수익 연결) -->
  <div class="affiliate" id="affiliateBox">
    <p>당신의 운과 잘 맞는 추천 아이템</p>
    <a href="https://link.coupang.com/a/erylCA" target="_blank">
      👉 지금 확인하기
    </a>
  </div>

</div>

<footer>
  © Fortune Platform
</footer>

<script>
function runFortune(type) {
  const name = document.getElementById("name").value || "사용자";
  const resultBox = document.getElementById("result");
  const affiliateBox = document.getElementById("affiliateBox");

  let text = "";

  if (type === "saju") {
    text = `
    ${name}님의 사주 분석

    - 초년운: 성장과 변화의 흐름
    - 중년운: 안정과 성취의 시기
    - 말년운: 결실과 정리의 운
    - 재물운: 점진적 상승 흐름
    - 연애운: 감정의 균형 중요
    - 건강운: 스트레스 관리 필요
    `;
  }

  if (type === "tojeong") {
    text = `
    토정비결 분석 결과

    올해는 변화와 선택의 기로에 서 있는 해입니다.
    작은 선택이 큰 흐름을 결정합니다.
    `;
  }

  if (type === "tarot") {
    text = `
    타로 결과

    "현재의 선택이 미래를 결정합니다."
    직관을 믿는 것이 핵심입니다.
    `;
  }

  if (type === "zodiac") {
    text = `
    별자리 운세

    오늘은 감정보다 이성이 중요한 날입니다.
    관계에서 균형이 필요합니다.
    `;
  }

  resultBox.innerHTML = "<div class='card'>" + text + "</div>";

  // 자연스럽게 추천 노출 (강요 느낌 없이)
  affiliateBox.style.display = "block";
}
</script>

</body>
</html>
