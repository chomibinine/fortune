<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>운명의 나침반</title>
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
</head>
<body>
  <div id="oracle-portal-root"></div>

  <script>
    (function() {
      var root = document.getElementById('oracle-portal-root');
      var shadow = root.attachShadow({mode: 'open'});
      var state = { name: '', y: 1990, m: 1, d: 1, cal: 'solar', time: 'none' };
      var currentYear = new Date().getFullYear();
      function $(id) { return shadow.getElementById(id); }

      // --- 1. 코어 디자인 (CSS) ---
      var css = 
        "@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');" +
        ":host { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2147483647; background: transparent; }" +
        ".app-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #05070a; color: #adbac7; font-family: 'Pretendard', sans-serif; line-height: 1.8; overflow-y: auto; text-align: left; box-sizing: border-box; }" +
        ".app-wrapper * { box-sizing: border-box; }" +
        ".container { max-width: 650px; margin: 0 auto; padding: 20px 20px 140px; }" +
        ".intro-box { text-align: center; padding: 50px 0 30px; border-bottom: 1px solid #1a1d23; margin-bottom: 30px; }" +
        ".intro-box h1 { color: #00f2ff; font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; margin: 0; text-shadow: 0 0 20px rgba(0,242,255,0.4); }" +
        ".card { background: #0d1117; border: 1px solid #1a1d23; border-radius: 28px; padding: 30px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }" +
        "label { display: block; margin: 15px 0 8px; font-size: 0.8rem; color: #00f2ff; font-weight: 800; text-transform: uppercase; }" +
        "input, select { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #1a1d23; background: #05070a; color: #fff; font-size: 1rem; outline: none; box-sizing: border-box; font-family: inherit; }" +
        ".btn-row { display: flex; gap: 10px; margin-bottom: 15px; }" +
        ".t-btn { flex: 1; padding: 14px; border-radius: 12px; background: #000; border: 1px solid #1a1d23; color: #4e5561; cursor: pointer; text-align: center; font-weight: 800; transition:0.2s; }" +
        ".t-btn.on { background: #00f2ff; color: #000; border-color: #00f2ff; }" +
        ".btn-run { background: #00f2ff; color: #000; border: none; padding: 22px; border-radius: 20px; width: 100%; font-weight: 900; font-size: 1.25rem; cursor: pointer; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,242,255,0.2); transition:0.3s; font-family: inherit; }" +
        ".process-dashboard { background: linear-gradient(145deg, #0d1117, #05070a); border: 1px solid #30363d; padding: 30px; border-radius: 24px; margin-bottom: 50px; position: relative; }" +
        ".data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }" +
        ".data-item { background: #000; border: 1px solid #1a1d23; padding: 15px; border-radius: 12px; font-size: 0.85rem; }" +
        ".data-item b { color: #00f2ff; display: block; font-size: 1.1rem; }" +
        ".report-sec { margin-bottom: 60px; opacity: 0; transform: translateY(20px); transition: 0.8s ease; }" +
        ".report-sec.show { opacity: 1; transform: translateY(0); }" +
        ".sec-t { font-size: 1.45rem; color: #fff; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }" +
        ".sec-t::before { content: ''; width: 6px; height: 22px; background: #ffd700; border-radius: 10px; }" +
        ".sum-box { background: rgba(255,215,0,0.05); padding: 25px; border-radius: 18px; font-weight: 800; color: #ffd700; margin-bottom: 25px; font-size: 1.15rem; border: 1px solid rgba(255,215,0,0.2); }" +
        ".det-text { font-size: 1.05rem; color: #e6edf3; line-height: 1.85; text-align: left; word-break: keep-all; }" +
        ".nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #0d1117; border-top: 1px solid #1a1d23; padding: 10px 0; z-index: 1000000; max-width: 650px; margin: 0 auto; }" +
        ".nav-i { flex: 1; text-align: center; color: #4e5561; cursor: pointer; font-size: 0.65rem; font-weight: 800; display: flex; flex-direction: column; gap: 5px; }" +
        ".nav-i.on { color: #00f2ff; }" +
        ".p-fill { width: 0%; height: 3px; background: #00f2ff; transition: 0.2s; box-shadow: 0 0 20px #00f2ff; margin-top: 25px; }" +
        ".tarot-pick { display: flex; justify-content: center; gap: 15px; margin: 40px 0; }" +
        ".t-card { width: 85px; height: 140px; background: linear-gradient(135deg, #1a1d23, #000); border: 2px solid #00f2ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; transition: 0.3s; }" +
        ".t-card:hover { transform: translateY(-15px); border-color: #ffd700; }" +
        ".coupang-disclaimer { font-size: 0.75rem; color: #4e5561; margin-top: 20px; text-align: center; font-weight: normal; }";

      // --- 2. 방대한 심층 데이터베이스 ---
      var gans = ["甲(갑)", "乙(을)", "丙(병)", "丁(정)", "戊(무)", "己(기)", "庚(경)", "辛(신)", "壬(임)", "癸(계)"];
      var jis = ["子(자)", "丑(축)", "寅(인)", "卯(묘)", "辰(진)", "巳(사)", "午(오)", "未(미)", "申(신)", "酉(유)", "戌(술)", "亥(해)"];
      var hanjaToKor = { '甲':'갑', '乙':'을', '丙':'병', '丁':'정', '戊':'무', '己':'기', '庚':'경', '辛':'신', '壬':'임', '癸':'계', '子':'자', '丑':'축', '寅':'인', '卯':'묘', '辰':'진', '巳':'사', '午':'오', '未':'미', '申':'신', '酉':'유', '戌':'술', '亥':'해' };
      var ganTraits = {
        "甲": "하늘을 향해 수직으로 뻗어나가는 거목의 기질입니다. 잔머리를 굴리기보다는 정공법으로 승부하며, 한 번 결심한 일은 절대 굽히지 않는 리더십이 귀하의 가장 큰 매력입니다.",
        "乙": "바람에 흔들리되 절대 꺾이지 않는 넝쿨과 같습니다. 놀라운 환경 적응력과 유연함을 타고났으며, 부드러운 미소 속에 감춰진 끈질긴 생명력이 귀하를 최후의 승자로 만듭니다.",
        "丙": "세상을 밝게 비추는 태양처럼, 주변 사람들에게 따뜻한 에너지를 나누어주는 분입니다. 열정적으로 목표를 향해 달려가는 모습이 눈부십니다.",
        "丁": "어둠을 은은하게 밝히는 촛불처럼, 사람의 마음을 꿰뚫어 보는 통찰력이 있습니다. 내면에는 세상을 바꿀 만한 따뜻하고 강렬한 불꽃이 숨어 있습니다.",
        "戊": "만물을 품어주는 거대한 산과 같습니다. 듬직하고 신용을 중시하며, 주변 사람들이 귀하에게 깊게 의지합니다.",
        "己": "씨앗을 길러내는 비옥한 대지처럼, 사람을 품고 키워내는 다정다감한 성품을 지녔습니다. 실속을 차릴 줄 알며 조화로운 지혜가 탁월합니다.",
        "庚": "강인한 무쇠처럼 의리와 결단력이 남다릅니다. 한 번 마음먹은 일은 어떤 난관도 끝까지 밀어붙이는 불굴의 의지가 무기입니다.",
        "辛": "눈부신 보석과도 같습니다. 섬세한 감각과 완벽을 추구하는 철저함 덕분에 어느 분야에서든 최고 전문가로 인정받게 됩니다.",
        "壬": "도도하게 흐르는 넓은 바다처럼 지혜가 깊습니다. 포용력이 넓으면서도 유연하게 대처하는 지략이 아주 뛰어납니다.",
        "癸": "만물을 적시는 봄비처럼 지식욕과 창의적 아이디어를 품고 있습니다. 따뜻한 감수성으로 사람들의 닫힌 마음을 다독여줍니다."
      };
      var expandDB = {
        sajuMethod: "<p>명리학 알고리즘을 통해 귀하가 태어난 연월일시의 태양 에너지 좌표를 분석합니다. 십간십이지 이론을 현대적으로 재해석하여 도출한 데이터입니다.</p>",
        lifetimeBase: function(seed) {
          var solutions = [
            "<p><b>[대기만성형]</b> 초년에 시행착오를 겪으며 내공을 쌓아 중년 이후 폭발적인 상승세를 타는 명식입니다. 노후에는 재물적 풍요와 존경을 동시에 누립니다.</p>",
            "<p><b>[자수성가형]</b> 부모나 타인의 도움 없이 오직 자신의 능력으로 무에서 유를 창조해 냅니다. 업계의 중심에 서게 되는 강인한 운기입니다.</p>",
            "<p><b>[평탄안정형]</b> 부모님이나 조상의 덕을 입어 큰 풍파 없이 평탄하게 성장합니다. 계단을 오르듯 착실하게 자산을 증식시키는 안정적인 사주입니다.</p>",
            "<p><b>[개척자형]</b> 기존의 틀을 거부하는 반항아적 기질로, 아무도 가지 않은 미지의 길에서 혁신을 일으켜 큰 부를 거머쥐는 다이내믹한 삶입니다.</p>"
          ];
          return solutions[seed % 4];
        },
        wealthBase: function(seed) { return "<p>현대 자본주의 사회에서 귀하의 재운은 능동적으로 가치를 창출할 때 확장됩니다. 조급함을 버리고 자신만의 원칙을 세울 때 재물은 자석처럼 끌려올 것입니다.</p>"; },
        healthBase: function(seed) { return "<p>책임감이 강해 뇌 신경계의 피로가 먼저 누적됩니다. 의도적인 로그아웃과 질 높은 휴식을 통해 생체 리듬의 균형을 되찾아야 합니다.</p>"; },
        loveBase: function(seed) { return "<p>애써 구걸하는 관계가 아닌, 당신의 파동이 맑아졌을 때 찾아오는 소울메이트에 집중하십시오. 인간관계의 양보다 질적인 밀도가 중요한 시기입니다.</p>"; }
      };

      var tojeongDB = [
        { h: "春山滿花 蝶自來尋", d1: "봄 동산에 꽃이 만발하니 나비가 찾아옵니다.", d2: "하반기부터 노력의 결실이 뚜렷하게 나타나며 귀인의 도움을 받게 됩니다." },
        { h: "旱天降雨 萬物蘇生", d1: "오랜 가뭄 끝에 단비가 내려 만물이 소생합니다.", d2: "막혔던 자금 흐름이 뚫리며 문서운이 강력해지니 중요한 결정에 유리합니다." }
      ];

      var tarotDB = [
        { n: "THE SUN", s: "성공과 기쁨이 찾아오는 순간", d: "모든 것이 명쾌해집니다. 본인의 능력을 믿고 에너지를 밖으로 발산하십시오." },
        { n: "THE EMPRESS", s: "물질적 풍요와 정서적 만족", d: "주변을 따뜻하게 돌보고 여유를 즐기십시오. 뜻밖의 행운이 자연스럽게 들어옵니다." }
      ];

      // --- 3. 로직 엔진 ---
      function getOhaeng(gan) { if('甲乙'.includes(gan[0])) return '목(木)'; if('丙丁'.includes(gan[0])) return '화(火)'; if('戊己'.includes(gan[0])) return '토(土)'; if('庚辛'.includes(gan[0])) return '금(金)'; return '수(水)'; }

      // --- 4. 화면 렌더링 ---
      window.renderPage = function(view) {
        var cUrl = window.location.href.split('?')[0];
        var badgeUrl = "https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=" + encodeURIComponent(cUrl) + "&count_bg=%2300f2ff&title_bg=%230d1117&title=%EB%B0%A9%EB%AC%B8%EC%9E%90&edge_flat=false";
        var html = '<style>' + css + '</style><div class="app-wrapper" id="app-wrapper"><div class="container">';
        
        if (view === 'home') {
          html += '<div class="intro-box"><h1>운명의 나침반</h1><p>천문 데이터 기반 프리미엄 운세 카운슬링</p><div style="margin-top:15px;"><img src="'+badgeUrl+'"></div></div>' +
            '<div class="card"><label>대상자 성함</label><input type="text" id="ui-name" value="'+state.name+'" placeholder="성함을 입력하세요">' +
            '<label>력 선택</label><div class="btn-row"><div id="s-btn" class="t-btn '+(state.cal==='solar'?'on':'')+'" onclick="window.updateCal(\'solar\')">양력</div><div id="l-btn" class="t-btn '+(state.cal==='lunar'?'on':'')+'" onclick="window.updateCal(\'lunar\')">음력</div></div>' +
            '<label>생년월일</label><div class="btn-row"><select id="ui-y"></select><select id="ui-m"></select><select id="ui-d"></select></div>' +
            '</div><div class="method-grid"><div class="method-card" onclick="window.executeFlow(\'saju\')"><h2>📜 정밀 사주 분석</h2><p>기질과 재물 흐름 상세 풀이</p></div>' +
            '<div class="method-card" onclick="window.executeFlow(\'tojeong\')"><h2>🗓️ '+currentYear+'년 토정비결</h2><p>올해 상/하반기 승부처 제시</p></div>' +
            '<div class="method-card" onclick="window.renderPage(\'tarot-pick\')"><h2>🃏 타로 무의식 스캔</h2><p>영적 솔루션 도출</p></div></div>';
        } else if (view === 'tarot-pick') {
          html += '<div class="intro-box"><h1>무의식의 거울</h1><p>카드를 선택하십시오.</p></div><div class="tarot-pick">' + '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>'.repeat(3) + '</div>';
        } else if (view === 'result') {
          html += '<div id="loader"><h2>DECODING DESTINY...</h2><div class="p-fill" id="p-fill"></div></div><div id="res-content" style="display:none;"><div class="intro-box"><h1 id="res-title"></h1></div><div id="report-body"></div><button class="btn-run" style="background:#1a1d23; color:#fff; margin-top:40px;" onclick="window.renderPage(\'home\')">돌아가기</button></div>';
        }
        html += '</div></div><nav class="nav"><div class="nav-i '+(view==='home'?'on':'')+'" onclick="window.renderPage(\'home\')"><b>🏠</b>홈</div><div class="nav-i" onclick="window.executeFlow(\'saju\')"><b>📜</b>사주</div><div class="nav-i" onclick="window.executeFlow(\'tojeong\')"><b>🗓️</b>토정</div><div class="nav-i" onclick="window.executeFlow(\'tarot\')"><b>🃏</b>타로</div></nav>';
        shadow.innerHTML = html; if (view === 'home') fillSelects();
      };

      window.updateCal = function(t) { state.cal = t; window.renderPage('home'); };
      window.executeFlow = function(type) {
        var n = $('ui-name'); if(n) state.name = n.value; if(!state.name) return alert("성함을 입력하십시오.");
        state.y = $('ui-y').value; state.m = $('ui-m').value; state.d = $('ui-d').value;
        if(type === 'tarot') window.renderPage('tarot-pick'); else window.buildReport(type);
      };

      window.buildReport = function(type) {
        window.renderPage('result');
        var p = 0; var itv = setInterval(function() { p += 10; $('p-fill').style.width = p + '%'; if(p >= 100) { clearInterval(itv); generateText(type); } }, 40);
      };

      async function generateText(type) {
        $('loader').style.display = 'none'; $('res-content').style.display = 'block';
        var sol = Solar.fromYmd(parseInt(state.y), parseInt(state.m), parseInt(state.d));
        var bazi = sol.getLunar().getEightChar(); var myGan = bazi.getDayGan(); var ohaeng = getOhaeng(myGan);
        var seed = state.name.split('').reduce((a,b)=>a+b.charCodeAt(0),0) + sol.getDay();
        $('res-title').innerText = state.name + "님의 운세 리포트";
        
        var reportHTML = "<div class='process-dashboard'><h3>📊 ANALYSIS DATA</h3><p>사주명식: "+bazi.getYearGan()+bazi.getYearZhi()+"년 "+bazi.getMonthGan()+bazi.getMonthZhi()+"월 "+bazi.getDayGan()+bazi.getDayZhi()+"일 ("+ohaeng+")</p></div>";
        var sections = [];
        if(type === 'saju') {
          sections = [{ t: "🌌 본원의 거울", s: "당신은 "+ohaeng+"의 에너지를 품고 있습니다.", d: "<p>"+ganTraits[myGan[0]]+"</p>" }, { t: "⏳ 인생 총운", s: "인생의 사계절을 해독합니다.", d: expandDB.lifetimeBase(seed) }, { t: "💼 재물 테크 전략", s: "가치 창출이 유리합니다.", d: expandDB.wealthBase(seed) }];
        } else if(type === 'tojeong') {
          var to = tojeongDB[seed % tojeongDB.length];
          sections = [{ t: "📜 괘사 및 총운", s: "「 " + to.h + " 」", d: "<p>" + to.d1 + "</p>" }, { t: "🎯 성공 전략", s: "운의 흐름이 핵심입니다.", d: "<p>" + to.d2 + "</p>" }];
        } else {
          var tk = tarotDB[seed % tarotDB.length];
          sections = [{ t: "🃏 타로 판독: "+tk.n, s: tk.s, d: "<p>"+tk.d+"</p>" }];
        }

        for(var i=0; i<sections.length; i++) {
          reportHTML += '<div class="report-sec" id="rsec-' + i + '"><div class="sec-t">' + sections[i].t + '</div><div class="sum-box">" ' + sections[i].s + ' "</div><div class="det-text">' + sections[i].d + '</div></div>';
        }

        // --- 수익화 및 필수 문구 반영 섹션 ---
        var items = {"목(木)":"천연 식물 화분","화(火)":"조명 무드등","토(土)":"가죽 지갑","금(金)":"메탈 시계","수(水)":"텀블러"};
        var selectedItem = items[ohaeng] || "행운 아이템";

        reportHTML += '<div class="card" style="margin-top:50px; border:1px solid #00f2ff; text-align:center;">' +
          '<h3 style="color:#00f2ff; margin-bottom:15px; font-weight:900;">✨ '+state.name+'님을 위한 개운 비책</h3>' +
          '<div class="sum-box" style="margin-bottom:25px;">오늘의 행운템: <b>'+selectedItem+'</b></div>' +
          '<a href="https://link.coupang.com/a/erqHD0?q=' + encodeURIComponent(selectedItem) + '" style="background:#00f2ff; color:#000; padding:18px 25px; border-radius:15px; text-decoration:none; font-weight:900; display:inline-block;" target="_blank">👉 '+selectedItem+' 최저가 확인하기</a>' +
          '<div class="coupang-disclaimer">이 서비스는 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div></div>';

        $('report-body').innerHTML = reportHTML;
        $('app-wrapper').scrollTo({top: 0, behavior: 'smooth'});
        shadow.querySelectorAll('.report-sec').forEach((el, i) => setTimeout(() => el.classList.add('show'), i * 200));
      }

      function fillSelects() {
        var sy = $('ui-y'), sm = $('ui-m'), sd = $('ui-d');
        for(var i=currentYear; i>=1940; i--) sy.add(new Option(i+'년', i)); sy.value = state.y;
        for(var i=1; i<=12; i++) sm.add(new Option(i+'월', i)); sm.value = state.m;
        for(var i=1; i<=31; i++) sd.add(new Option(i+'일', i)); sd.value = state.d;
      }
      function initApp() { if (typeof Lunar === 'undefined') { setTimeout(initApp, 100); return; } window.renderPage('home'); }
      initApp();
    })();
  </script>
