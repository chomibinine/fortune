        sajuMethod: "<p><b>[정통 사주 명리학의 결과 도출 근거]</b></p><p>본 카운슬링은 수천 년간 축적된 동양 천문학의 결정체인 명리학(命理學)의 '자평진전' 및 '적천수'의 십간십이지 이론을 현대적 알고리즘으로 완벽히 복원하여 결과를 도출합니다. 귀하가 태어난 연월일시의 태양의 위치(24절기 황경 좌표)를 추적하여 입체적인 우주 에너지를 8개의 한자(사주팔자)로 환산합니다.</p><p>단순한 통계나 미신이 아닙니다. 태어난 계절이 부여하는 월지(月支)의 조후(온도와 습도)를 분석하고, 일간(日干)이라는 귀하의 영혼의 중심 코어가 주변의 오행(목, 화, 토, 금, 수)과 어떻게 상호작용하는지 생극제화(生剋制化)의 원리로 역학적 계산을 수행합니다. 이를 통해 귀하의 선천적 뇌구조, 스트레스 반응 기제, 그리고 현대 자본주의 사회에서 어떤 방식으로 사회적 가치를 창출해야 가장 유리한지, 그 고유한 '생존 메뉴얼'을 과학적인 태도로 짚어냅니다.</p>",

        starMethod: "<p><b>[서양 점성학(Astrology)의 네이탈 차트 도출 근거]</b></p><p>본 분석은 고대 바빌로니아에서 시작되어 헬레니즘 시대를 거쳐 완성된 서양 점성술의 천체 투영 기법을 사용합니다. 귀하가 첫 숨을 들이마신 정확한 순간, 태양계의 10대 행성(태양, 달, 수성, 금성, 화성, 목성, 토성, 천왕성, 해왕성, 명왕성)이 황도 12궁(Zodiac)의 어느 좌표에 위치해 있었는지를 기하학적으로 역산하여 운명의 지도를 그립니다.</p><p>태양 별자리는 귀하의 표면적 자아와 인생의 궁극적 목표를, 달 별자리는 무의식적 감정 패턴을 나타냅니다. 본 리포트는 행성 간의 각도(Aspect)가 만들어내는 에너지의 긴장과 조화를 심리학적 관점(칼 융의 분석심리학)으로 재해석하여, 귀하 내면에 잠재된 모순을 해결하고 가장 매력적인 자본으로 승화시킬 수 있는 우주적 조언을 1000자 이상의 심층 텍스트로 전달합니다.</p>",
        tarotMethod: "<p><b>[타로 동시성 원리와 아키타입 도출 근거]</b></p><p>본 카운슬링은 단순한 무작위 추출이 아닙니다. 스위스의 심리학자 칼 구스타프 융이 제창한 '동시성(Synchronicity)' 이론, 즉 의미 있는 우연의 일치라는 양자역학적 심리 원리에 기반합니다. 귀하가 현재 안고 있는 딜레마나 불안 요소에 깊이 집중하는 순간, 귀하의 무의식적 파동이 디지털 난수 발생기에 미세한 영향을 미쳐 가장 적합한 아키타입(원형)의 카드를 수면 위로 끌어올립니다.</p><p>선택된 메이저 아르카나 카드는 귀하의 내면 깊은 곳에서 이미 알고 있는 정답을 시각적 상징(Symbol)으로 투영해 주는 거울입니다. 우리는 이 상징들을 해체하고 현대인의 라이프스타일에 맞게 재조립하여, 꽉 막힌 현재의 상황을 타개할 심리적 솔루션과 구체적인 행동 지침을 방대한 텍스트로 풀어냅니다. 카드에 담긴 우주의 조언을 통해 내면의 직관을 깨워보십시오.</p>",

        { n: "THE EMPRESS (여황제)", s: "물질적인 풍요와 정서적 만족감이 가득 차오르는 평화와 안정", d: "깊은 편안함과 풍요로움을 의미합니다. 무언가를 억지로 쟁취하려 하지 마십시오. 지금 그 자리에서 주변을 따뜻하게 돌보고 여유를 즐길 때 뜻밖의 행운이 굴러들어옵니다." },
        { n: "WHEEL OF FORTUNE (수레바퀴)", s: "거스를 수 없는 긍정적 변화의 파도, 기꺼이 그 흐름에 올라타라", d: "당신의 삶에 거대한 변화의 챕터가 시작되고 있습니다. 이직이나 이사, 새로운 인연 등 환경이 크게 변할 수 있습니다. 이는 두려워할 일이 아니라 더 높은 곳으로 가기 위한 안배입니다." }
      ];

      // --- 3. 천문 역법 기반 로직 엔진 ---
      function getOhaeng(gan) {
        if(gan === '甲' || gan === '乙') return '목(木)'; if(gan === '丙' || gan === '丁') return '화(火)';
        if(gan === '戊' || gan === '己') return '토(土)'; if(gan === '庚' || gan === '辛') return '금(金)'; return '수(水)';
      }
      function getStarSign(m, d) {
        var dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
        var signs = ["염소", "물병", "물고기", "양", "황소", "쌍둥이", "게", "사자", "처녀", "천칭", "전갈", "사수", "염소"];
        return signs[d > dates[m - 1] ? m : m - 1];
      }

      // --- 4. 앱 구동 및 화면 렌더링 ---
      window.renderPage = function(view) {
        var html = '<style>' + css + '</style><div class="app-wrapper" id="app-wrapper"><div class="container">';
        if (view === 'home') {
          // 카운터 배지 정상화 로직 (URL 파라미터 고정)
          var siteId = "fortune-navigator-hits";
          var counterBadgeUrl = "https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=" + encodeURIComponent("https://github.com/" + siteId) + "&count_bg=%2300f2ff&title_bg=%230d1117&title=%EB%B0%A9%EB%AC%B8%EC%9E%90&edge_flat=false";

          html += '<div class="intro-box"><h1>운명의 나침반</h1><p>천문 데이터 기반 프리미엄 운세 카운슬링</p>' +
            '<div style="margin-top: 18px;"><img src="' + counterBadgeUrl + '" alt="Visitor Count"></div></div>' +
            '<div class="card">' +
            '<label>대상자 성함</label><input type="text" id="ui-name" value="' + state.name + '" placeholder="성함을 입력하세요">' +
            '<label>력 선택</label><div class="btn-row"><div id="s-btn" class="t-btn ' + (state.cal==='solar'?'on':'') + '" onclick="window.updateCal(\'solar\')">양력</div><div id="l-btn" class="t-btn ' + (state.cal==='lunar'?'on':'') + '" onclick="window.updateCal(\'lunar\')">음력</div></div>' +
            '<label>생년월일</label><div class="btn-row"><select id="ui-y"></select><select id="ui-m"></select><select id="ui-d"></select></div>' +
            '<label>태어난 시각 (정밀 분석)</label><select id="ui-t">' +
            '<option value="미정">모름/미정 (기본값)</option><option value="자">자시(23:30~01:29)</option><option value="축">축시(01:30~03:29)</option><option value="인">인시(03:30~05:29)</option><option value="묘">묘시(05:30~07:29)</option><option value="진">진시(07:30~09:29)</option><option value="사">사시(09:30~11:29)</option><option value="오">오시(11:30~13:29)</option><option value="미">미시(13:30~15:29)</option><option value="신">신시(15:30~17:29)</option><option value="유">유시(17:30~19:29)</option><option value="술">술시(19:30~21:29)</option><option value="해">해시(21:30~23:29)</option></select>' +
            '</div>' +
            '<div class="method-grid">' +
            '<div class="method-card" onclick="window.executeFlow(\'saju\')"><h2>📜 정통 사주 심층 분석</h2><p>본인의 60갑자 기질과 재물 흐름을 상세히 풀이합니다.</p></div>' +
            '<div class="method-card" onclick="window.executeFlow(\'tojeong\')"><h2>🗓️ ' + currentYear + '년 토정비결</h2><p>이지함 선생의 144괘 알고리즘으로 승부처를 제시합니다.</p></div>' +
            '<div class="method-card" onclick="window.executeFlow(\'star\')"><h2>✨ 서양 점성술</h2><p>우주 천체 좌표로 당신의 숨겨진 매력을 읽어냅니다.</p></div>' +
            '<div class="method-card" onclick="window.renderPage(\'tarot-pick\')"><h2>🃏 타로 무의식 스캔</h2><p>현재 겪고 있는 딜레마를 타파할 솔루션을 제안합니다.</p></div>' +
            '</div>';
        } 
        else if (view === 'tarot-pick') {
          html += '<div class="intro-box"><h1>무의식의 거울</h1><p>해결하고 싶은 문제를 떠올리며 카드를 고르십시오.</p></div>' +
                  '<div class="tarot-pick">' +
                  '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>' +
                  '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>' +
                  '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>' +
                  '</div>';
        }
        else if (view === 'result') {
          html += '<div id="loader"><h2>DECODING DESTINY MATRIX...</h2><div class="p-bar"><div class="p-fill" id="p-fill"></div></div></div>' +
                  '<div id="res-content" style="display:none;">' +
                  '<div class="intro-box"><h1 id="res-title"></h1></div>' +
                  '<div id="report-body"></div>' +
                  '<button class="btn-run" style="background:#1a1d23; color:#fff; margin-top:40px;" onclick="window.renderPage(\'home\')">홈 화면으로 돌아가기</button></div>';
        }
        html += '</div></div>' +
          '<nav class="nav">' +
          '<div class="nav-i ' + (view==='home'?'on':'') + '" onclick="window.renderPage(\'home\')"><b>🏠</b>홈</div>' +
          '<div class="nav-i" onclick="window.executeFlow(\'saju\')"><b>📜</b>사주</div>' +
          '<div class="nav-i" onclick="window.executeFlow(\'tojeong\')"><b>🗓️</b>토정</div>' +
          '<div class="nav-i" onclick="window.executeFlow(\'tarot\')"><b>🃏</b>타로</div>' +
          '</nav>';
        shadow.innerHTML = html;
        if (view === 'home') fillSelects();
      };

      window.updateCal = function(t) { state.cal = t; window.renderPage('home'); };
      window.executeFlow = function(type) {
        var nInput = $('ui-name'); if (nInput) { state.name = nInput.value; state.y = parseInt($('ui-y').value); state.m = parseInt($('ui-m').value); state.d = parseInt($('ui-d').value); state.time = $('ui-t').value; }
        if(!state.name) { alert("분석을 위해 성함을 입력해 주십시오."); return; }
        if(type === 'tarot') { window.renderPage('tarot-pick'); } else { window.buildReport(type); }
      };

      window.buildReport = function(type) {
        window.renderPage('result');
        var p = 0; var fill = $('p-fill');
        var itv = setInterval(function() { p += 5; fill.style.width = p + '%'; if(p >= 100) { clearInterval(itv); generateText(type); } }, 40);
      };

      async function generateText(type) {
        $('loader').style.display = 'none'; $('res-content').style.display = 'block';
        var solarDate, lunarDate;
        var isLunarLoaded = (typeof Solar !== 'undefined' && typeof Lunar !== 'undefined');
        if (isLunarLoaded) {
          if (state.cal === 'solar') { solarDate = Solar.fromYmd(state.y, state.m, state.d); lunarDate = solarDate.getLunar(); } 
          else { lunarDate = Lunar.fromYmd(state.y, state.m, state.d); solarDate = lunarDate.getSolar(); }
        }
        var sY = isLunarLoaded ? solarDate.getYear() : state.y; var sM = isLunarLoaded ? solarDate.getMonth() : state.m; var sD = isLunarLoaded ? solarDate.getDay() : state.d;
        var myGan = "甲"; var baziStr = "데이터 추출 중";
        if (isLunarLoaded) { var bazi = lunarDate.getEightChar(); myGan = bazi.getDayGan(); baziStr = bazi.getYearGan()+bazi.getYearZhi()+"년 "+bazi.getMonthGan()+bazi.getMonthZhi()+"월 "+bazi.getDayGan()+bazi.getDayZhi()+"일"; }
        var ohaeng = getOhaeng(myGan);
        var seed = 0; for(var k=0; k<state.name.length; k++) { seed += state.name.charCodeAt(k); } seed += (sY + sM + sD);

        var title = $('res-title'); var body = $('report-body');
        title.innerText = state.name + "님의 운세 리포트";
        var processHtml = "<div class='process-dashboard'><h3>📊 분석 및 도출 근거</h3><div class='data-grid'>" +
          "<div class='data-item'><b>입력날짜</b>" + state.y + "." + state.m + "." + state.d + "</div>" +
          "<div class='data-item'><b>사주명식</b>" + baziStr + "</div>" +
          "</div><div class='process-text'>" + (type === 'saju' ? expandDB.sajuMethod : type === 'tojeong' ? expandDB.tojeongMethod : type === 'tarot' ? expandDB.tarotMethod : expandDB.starMethod) + "</div></div>";
        
        var sections = [];
        if (type === 'saju') {
          sections = [
            { t: "🌌 본원의 거울", s: "귀하는 " + ohaeng + "의 기운을 품고 태어났습니다.", d: "<p>" + ganTraits[myGan[0]] + "</p>" },
            { t: "⏳ 인생 총운", s: "귀하의 인생 전반을 가로지르는 우주의 흐름입니다.", d: expandDB.lifetimeBase(seed) },
            { t: "💼 재물 테크 전략", s: "시대의 흐름을 읽는 통찰력이 당신의 무기입니다.", d: expandDB.wealthBase(seed) },
            { t: "❤️ 대인관계", s: "주파수가 맞는 인연이 행운을 물어다 줍니다.", d: expandDB.loveBase(seed) },
            { t: "🏥 건강 밸런스", s: "에너지의 연소만큼 질 높은 휴식이 절실합니다.", d: expandDB.healthBase(seed) }
          ];
        } 
        else if (type === 'tojeong') {
          var to = tojeongDB[seed % tojeongDB.length];
          sections = [{ t: "📜 괘사 및 총운", s: "「 " + to.h + " 」", d: "<p>" + to.d1 + "</p>" }, { t: "🎯 성공 전략", s: "운의 승부처와 공략 지침입니다.", d: "<p>" + to.d2 + "</p>" }];
        } 
        else if (type === 'star') {
          var sk = getStarSign(sM, sD);
          sections = [{ t: "✨ " + sk + "자리 매력", s: starTraits[sk], d: "<p>당신만이 가진 고유한 매력 자본을 인정하고 이를 세상에 증명할 때 기적 같은 성공이 시작됩니다.</p>" }];
        } 
        else {
          var tk = tarotDB[seed % tarotDB.length];
          sections = [{ t: "🃏 타로 판독: " + tk.n, s: tk.s, d: "<p>" + tk.d + "</p>" }];
        }

        var htmlData = processHtml;
        for(var i=0; i<sections.length; i++) {
          htmlData += '<div class="report-sec" id="rsec-' + i + '"><div class="sec-t">' + sections[i].t + '</div><div class="sum-box">" ' + sections[i].s + ' "</div><div class="det-text" id="rdet-' + i + '"></div></div>';
        }

        // --- 수익화 및 정책 문구 반영 섹션 ---
        var itemMap = {"목(木)":"천연 식물 화분","화(火)":"조명 무드등","토(土)":"가죽 지갑","금(金)":"메탈 시계","수(수)":"스테인리스 텀블러"};
        var selItem = itemMap[ohaeng] || "행운 아이템";
        var coupangUrl = "https://link.coupang.com/a/erqHD0?q=" + encodeURIComponent(selItem);

        htmlData += '<div class="card" style="margin-top:50px; border:1px solid #00f2ff; text-align:center;">' +
          '<h3 style="color:#00f2ff; margin-bottom:15px; font-weight:900;">✨ '+state.name+'님을 위한 개운 비책</h3>' +
          '<p style="font-size:0.9rem; color:#768390; margin-bottom:20px;">귀하의 기운을 보완해줄 행운의 개운 아이템입니다.</p>' +
          '<div class="sum-box" style="margin-bottom:25px;">오늘의 추천 아이템: <b>'+selItem+'</b></div>' +
          '<a href="' + coupangUrl + '" class="btn-buy" target="_blank">👉 '+selItem+' 최저가 확인하기</a>' +
          '<div class="coupang-disclaimer">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div></div>';

        body.innerHTML = htmlData;
        $('app-wrapper').scrollTo({top: 0, behavior: 'smooth'});

        for(var j=0; j<sections.length; j++) {
          $('rdet-' + j).innerHTML = sections[j].d;
          (function(idx) { setTimeout(function() { $('rsec-' + idx).classList.add('show'); }, idx * 250); })(j);
        }
      }

      function fillSelects() {
        var sy = $('ui-y'), sm = $('ui-m'), sd = $('ui-d');
        for(var i=currentYear; i>=1940; i--) sy.add(new Option(i+'년', i)); sy.value = state.y;
        for(var i=1; i<=12; i++) sm.add(new Option(i+'월', i)); sm.value = state.m;
        for(var i=1; i<=31; i++) sd.add(new Option(i+'일', i)); sd.value = state.d;
      }
      function initApp() { if (typeof Lunar === 'undefined') { setTimeout(initApp, 100); return; } window.renderPage('home'); }
      initApp();
    })();
  </script>
</body>
