<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명의 나침반 - 프리미엄 정통 운세 포털</title>
    <!-- 정통 천문 역법 연산을 위한 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg: #05070a;
            --card: #0d1117;
            --accent: #00f2ff;
            --gold: #ffd700;
            --border: #1a1d23;
            --text-muted: #768390;
            --text-main: #adbac7;
            --white: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); line-height: 1.8; overflow-x: hidden; }

        .app-container { max-width: 600px; margin: 0 auto; padding: 20px 20px 140px; }

        /* --- Header --- */
        .header { text-align: center; padding: 60px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .header h1 { color: var(--accent); font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; margin: 0; text-shadow: 0 0 20px rgba(0,242,255,0.4); }
        .header p { margin-top: 10px; font-size: 0.9rem; opacity: 0.7; }

        /* --- Input Card --- */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 30px; margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        label { display: block; margin-bottom: 8px; font-weight: 800; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; font-size: 1rem; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        /* --- Menu Grid --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .menu-item { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 30px 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { border-color: var(--accent); transform: translateY(-5px); }
        .menu-item b { font-size: 2.2rem; display: block; margin-bottom: 10px; font-style: normal; }
        .menu-item h3 { margin: 0; font-size: 1.05rem; color: var(--white); font-weight: 800; }
        .menu-item p { margin: 5px 0 0; font-size: 0.75rem; color: var(--text-muted); }

        /* --- Result View --- */
        #result-view { display: none; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sec-title { font-size: 1.5rem; color: var(--white); font-weight: 900; margin: 40px 0 20px; display: flex; align-items: center; gap: 10px; }
        .sec-title::before { content: ''; width: 5px; height: 24px; background: var(--gold); border-radius: 10px; box-shadow: 0 0 10px var(--gold); }

        .summary-box { background: rgba(255, 215, 0, 0.06); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 20px; padding: 30px; margin-bottom: 30px; color: var(--gold); font-weight: 800; text-align: center; font-size: 1.1rem; line-height: 1.6; }
        .detail-text { font-size: 1.05rem; line-height: 2.0; color: var(--text-main); text-align: justify; word-break: keep-all; }
        .detail-text p { margin-bottom: 20px; }

        /* --- Pillars --- */
        .pillar-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 35px; }
        .pillar { background: #000; padding: 15px 5px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .pillar span { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; }
        .pillar b { font-size: 1.3rem; color: var(--accent); text-shadow: 0 0 10px rgba(0,242,255,0.2); }

        /* --- Lucky Action (이미지 디자인 반영) --- */
        .action-box { margin-top: 60px; padding: 35px; border-radius: 35px; border: 1px solid var(--accent); background: linear-gradient(180deg, #0d1117 0%, #05070a 100%); text-align: center; position: relative; }
        .action-box h2 { color: var(--accent); font-size: 1.4rem; margin: 0 0 25px; font-weight: 900; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .action-item { background: #05070a; border: 1px solid var(--border); border-radius: 20px; padding: 20px 10px; }
        .action-item .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 700; }
        .action-item .value { font-size: 1.1rem; color: var(--gold); font-weight: 900; line-height: 1.3; }

        /* --- Coupang Button --- */
        .btn-buy { display: inline-block; background: var(--accent); color: #000; padding: 22px 40px; border-radius: 18px; text-decoration: none; font-weight: 900; font-size: 1.2rem; box-shadow: 0 10px 25px rgba(0, 242, 255, 0.3); transition: 0.3s; }
        .btn-buy:hover { background: #fff; transform: scale(1.03); }
        .disclaimer { font-size: 0.7rem; color: #4e5561; margin-top: 25px; line-height: 1.5; }

        /* --- Nav --- */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: rgba(13, 17, 23, 0.96); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { color: #4e5561; text-align: center; font-size: 0.75rem; font-weight: 800; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; gap: 5px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.6rem; font-style: normal; }

        /* --- Loader --- */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(0, 242, 255, 0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Visitor --- */
        .visitor-count { text-align: center; padding: 20px; font-size: 0.8rem; color: #4e5561; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="color: var(--accent); margin-top: 25px; font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">운명의 실타래를 분석하는 중...</p>
</div>

<div class="app-container">
    <div id="home-view">
        <header class="header">
            <h1>운명의 나침반</h1>
            <p>정통 천문 역법 및 심리학 기반 프리미엄 운세 리포트</p>
        </header>

        <div class="card">
            <label>분석 대상 성함</label>
            <input type="text" id="user-name" placeholder="성함을 입력하세요" value="">
            
            <div style="display: flex; gap: 12px;">
                <div style="flex: 2;">
                    <label>생년월일</label>
                    <input type="date" id="user-birth">
                </div>
                <div style="flex: 1;">
                    <label>력 체계</label>
                    <select id="user-cal">
                        <option value="solar">양력</option>
                        <option value="lunar">음력</option>
                    </select>
                </div>
            </div>
            
            <label>태어난 시각</label>
            <select id="user-time">
                <option value="none">모름 / 미정</option>
                <option value="자">자시 (23:30 ~ 01:29)</option>
                <option value="축">축시 (01:30 ~ 03:29)</option>
                <option value="인">인시 (03:30 ~ 05:29)</option>
                <option value="묘">묘시 (05:30 ~ 07:29)</option>
                <option value="진">진시 (07:30 ~ 09:29)</option>
                <option value="사">사시 (09:30 ~ 11:29)</option>
                <option value="오">오시 (11:30 ~ 13:29)</option>
                <option value="미">미시 (13:30 ~ 15:29)</option>
                <option value="신">신시 (15:30 ~ 17:29)</option>
                <option value="유">유시 (17:30 ~ 19:29)</option>
                <option value="술">술시 (19:30 ~ 21:29)</option>
                <option value="해">해시 (21:30 ~ 23:29)</option>
            </select>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="handleStart('saju')">
                <b>🧭</b>
                <h3>정통 사주 분석</h3>
                <p>8단계 심층 구조 리포트</p>
            </div>
            <div class="menu-item" onclick="handleStart('tojeong')">
                <b>📜</b>
                <h3>정통 토정비결</h3>
                <p>144괘 연간/월별 운세</p>
            </div>
            <div class="menu-item" onclick="handleStart('star')">
                <b>✨</b>
                <h3>별자리 심리</h3>
                <p>태양궁 기반 기질 분석</p>
            </div>
            <div class="menu-item" onclick="handleStart('tarot')">
                <b>🃏</b>
                <h3>타로 무의식</h3>
                <p>선택 기반 심리 솔루션</p>
            </div>
        </div>

        <div class="visitor-count" id="visitor-ui"></div>
    </div>

    <div id="result-view">
        <div id="report-content"></div>
        <button class="btn-buy" style="background: var(--card); color: #fff; width: 100%; margin-top: 30px; box-shadow: none;" onclick="location.reload()">홈으로 돌아가기</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="location.reload()"><i>🏠</i>홈</div>
    <div class="nav-item" onclick="handleStart('saju')"><i>🧭</i>사주</div>
    <div class="nav-item" onclick="handleStart('tojeong')"><i>📜</i>토정</div>
    <div class="nav-item" onclick="handleStart('tarot')"><i>🃏</i>타로</div>
</nav>

<script>
    // --- 데이터 저장소 (8단계 사주 및 정통 해석) ---
    const sajuContents = {
        personality: (gan) => `<p>귀하의 본질인 <b>일간(${gan})</b>은 운명의 나침반이자 인생을 이끄는 핵심 동력입니다. 외부의 압력에 굴복하기보다 자신만의 주관을 지키려는 성질이 강하며, 논리적인 체계 속에 비범한 직관력을 숨기고 있는 전략가적 기질을 타고났습니다.</p>`,
        wealth: `<p>재물운은 단순한 노동보다는 <b>'시스템과 지혜의 결합'</b>에서 발생합니다. 무에서 유를 창조하는 기획 능력이 뛰어나므로, 단기적인 수익에 일희일비하기보다 3년 이상의 장기적인 가치 투자와 자산 구축에 에너지를 쏟는 것이 부의 그릇을 채우는 비결입니다.</p>`,
        advice: `<p>귀하의 명식은 <b>대기만성형 개척자</b>의 구조를 가졌습니다. 초년의 담금질은 중년의 비상을 위한 데이터 축적 과정입니다. 남들의 속도에 맞추지 말고 당신만의 리듬을 유지할 때, 우주는 상상 이상의 거대한 결실을 예비해 둘 것입니다.</p>`
    };

    function getOhaeng(gan) {
        if ('甲乙'.includes(gan)) return '목(木)';
        if ('丙丁'.includes(gan)) return '화(火)';
        if ('戊己'.includes(gan)) return '토(土)';
        if ('庚辛'.includes(gan)) return '금(金)';
        return '수(水)';
    }

    function getLuckyData(ohaeng) {
        const data = {
            '목(木)': { item: '천연 식물 화분', dir: '정동쪽 (성장/희망)', color: '그린 & 라이트 블루', num: '3, 8' },
            '화(火)': { item: '조명 무드등', dir: '정남쪽 (명예/확산)', color: '버건디 레드 & 퍼플', num: '2, 7' },
            '토(土)': { item: '가죽 지갑 / 벨트', dir: '중앙 & 동북쪽 (안정)', color: '황토색 & 베이지', num: '5, 0' },
            '금(金)': { item: '메탈 시계 / 주얼리', dir: '정서쪽 (재물/결실)', color: '코발트 블루 & 실버', num: '4, 9' },
            '수(水)': { item: '가습기 / 텀블러', dir: '정북쪽 (지혜/유연)', color: '딥 블랙 & 네이비', num: '1, 6' }
        };
        return data[ohaeng] || data['토(土)'];
    }

    // --- 실행 로직 ---
    async function handleStart(type) {
        const name = document.getElementById('user-name').value;
        const birth = document.getElementById('user-birth').value;
        if (!name || !birth) return alert("성함과 생년월일을 입력해주세요.");

        document.getElementById('loader').style.display = 'flex';

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';

            const birthDate = new Date(birth);
            const sol = Solar.fromYmd(birthDate.getFullYear(), birthDate.getMonth() + 1, birthDate.getDate());
            const bazi = sol.getLunar().getEightChar();
            const myGan = bazi.getDayGan();
            const ohaeng = getOhaeng(myGan);
            const luck = getLuckyData(ohaeng);
            const seed = name.length + birthDate.getDate();

            renderReport(type, { name, bazi, ohaeng, luck, seed });
        }, 1600);
    }

    function renderReport(type, d) {
        let html = `<div class="header"><h1>${d.name}님의 운명 리포트</h1></div>`;

        if (type === 'saju') {
            html += `
                <div class="pillar-row">
                    <div class="pillar"><span>시주</span><b>-</b></div>
                    <div class="pillar"><span>일주</span><b>${d.bazi.getDayGan()}${d.bazi.getDayZhi()}</b></div>
                    <div class="pillar"><span>월주</span><b>${d.bazi.getMonthGan()}${d.bazi.getMonthZhi()}</b></div>
                    <div class="pillar"><span>연주</span><b>${d.bazi.getYearGan()}${d.bazi.getYearZhi()}</b></div>
                </div>
                <div class="sec-title">1. 기본 성향 분석</div>
                <div class="summary-box">"귀하는 ${d.ohaeng}의 기운을 타고난 주도적 전략가입니다."</div>
                <div class="detail-text">${sajuContents.personality(d.bazi.getDayGan())}</div>
                <div class="sec-title">5. 재물운 및 가치 창출</div>
                <div class="detail-text">${sajuContents.wealth}</div>
                <div class="sec-title">8. 종합 조언</div>
                <div class="detail-text">${sajuContents.advice}</div>
            `;
        } else if (type === 'tojeong') {
            html += `
                <div class="sec-title">토정비결 괘(卦) 분석</div>
                <div class="summary-box">"봄 산에 꽃이 만발하니 나비가 스스로 찾아오는 형국입니다."</div>
                <div class="detail-text">
                    <p><b>[올해의 총운]</b> 막혔던 자금의 흐름이 물꼬를 트고 주변에 조력자가 모여드는 시기입니다. 무리한 확장보다는 내실을 기하며 하반기의 기회를 포착하십시오.</p>
                    <p><b>[월별 흐름]</b> 상반기에는 대인관계의 폭을 넓히고, 하반기에는 문서운과 명예운이 강력해지니 계약이나 이직에 유리한 해입니다.</p>
                </div>
            `;
        } else if (type === 'tarot') {
            html += `
                <div class="sec-title">타로 무의식 판독</div>
                <div style="text-align:center; margin-bottom:30px;">
                    <div style="width:150px; height:240px; margin:0 auto; background:linear-gradient(135deg, #1a1d23, #000); border:3px solid var(--gold); border-radius:15px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 0 30px rgba(255,215,0,0.2);">
                        <b style="font-size:5rem;">☀️</b>
                        <span style="color:var(--gold); font-weight:900; margin-top:10px;">THE SUN</span>
                    </div>
                </div>
                <div class="summary-box">"어둠이 걷히고 모든 광채가 당신을 향하고 있습니다."</div>
                <div class="detail-text"><p>지금 당신이 품고 있는 고민은 곧 밝은 에너지로 전환될 것입니다. 망설이지 말고 당신의 능력을 세상에 증명하십시오. 완벽한 성공이 도래할 타이밍입니다.</p></div>
            `;
        } else {
            html += `<div class="summary-box">분석 로직을 연산 중입니다. 사주와 타로 서비스를 먼저 이용해 보세요.</div>`;
        }

        // --- Lucky Action Grid (쿠팡 erqHD0 연동) ---
        const coupangUrl = `https://www.coupang.com/np/search?q=${encodeURIComponent(d.luck.item)}&utm_source=affiliate&utm_medium=affiliate&utm_campaign=link_erqHD0`;
        
        html += `
            <div class="action-box">
                <h2>✨ ${d.name}님을 위한 개운(開運) 액션</h2>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:25px;">막힌 운을 뚫고 긍정적인 에너지를 내 편으로 만드는 비결</p>
                <div class="action-grid">
                    <div class="action-item"><div class="label">행운의 방향</div><div class="value">${d.luck.dir}</div></div>
                    <div class="action-item"><div class="label">수호 색상</div><div class="value">${d.luck.color}</div></div>
                    <div class="action-item"><div class="label">행운의 숫자</div><div class="value">${d.luck.num}</div></div>
                    <div class="action-item"><div class="label">추천 행운템</div><div class="value">${d.luck.item}</div></div>
                </div>
                <a href="${coupangUrl}" target="_blank" class="btn-buy">👉 ${d.luck.item} 최저가 확인하기</a>
                <div class="disclaimer">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>
            </div>
        `;

        document.getElementById('report-content').innerHTML = html;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- 카운터 및 초기화 ---
    function initApp() {
        const totalK = 'destiny_total_count';
        const todayK = 'destiny_today_count_' + new Date().toDateString();
        let total = parseInt(localStorage.getItem(totalK) || 0) + 1;
        let today = parseInt(localStorage.getItem(todayK) || 0) + 1;
        localStorage.setItem(totalK, total);
        localStorage.setItem(todayK, today);
        document.getElementById('visitor-ui').innerHTML = `🔮 오늘 <b>${today}</b>명 · 누적 <b>${total}</b>명 상담 중`;
    }

    window.onload = initApp;
</script>
</body>
</html>
