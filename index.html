        { h: "旱天降雨 萬物蘇生 (한천강우 만물소생)", d1: "오랜 가뭄 끝에 단비가 내려 만물이 소생하듯 막혔던 일이 시원하게 뚫립니다.", d2: "가을을 전후하여 문서운이 강력해지니 중요한 결정은 이때 내리셔도 좋습니다." }
      ];

      var starTraits = {
        "양": "개척자 정신이 빛나는 불꽃 같은 열정", "황소": "안정감과 미적 감각이 뛰어난 풍요의 대지", "쌍둥이": "소통 능력이 탁월한 지성의 바람", "게": "깊은 공감 능력을 지닌 감정의 샘", "사자": "카리스마 넘치는 태양의 군주", "처녀": "분석력이 뛰어난 완벽한 수확자", "천칭": "밸런스를 맞출 줄 아는 조화의 저울", "전갈": "통찰력이 뛰어난 심연의 통찰가", "사수": "긍정 에너지가 넘치는 자유의 화살", "염소": "야망을 품은 고독한 정상", "물병": "혁신을 꿈꾸는 독창적인 별", "물고기": "감수성이 풍부한 무한한 바다"
      };

      var tarotDB = [
        { n: "THE SUN (태양)", s: "성공과 기쁨이 찾아오는 최고의 순간", d: "어둠이 걷히고 모든 것이 명쾌해집니다. 본인의 능력을 믿고 에너지를 발산하십시오." },
        { n: "THE EMPRESS (여황제)", s: "물질적 풍요와 정서적 만족감", d: "주변을 따뜻하게 돌보고 여유를 즐기십시오. 행운이 자연스럽게 흘러들어옵니다." }
      ];

      // --- 3. 천문 역법 기반 로직 엔진 ---
      function getOhaeng(gan) {
        if(gan === '甲' || gan === '乙') return '목(木)'; if(gan === '丙' || gan === '丁') return '화(火)';
        if(gan === '戊' || gan === '己') return '토(土)'; if(gan === '庚' || gan === '辛') return '금(金)'; return '수(水)';
      }
      
      function getStarSign(m, d) {
        var dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
        var signs = ["염소", "물병", "물고기", "양", "황소", "쌍둥이", "게", "사자", "처녀", "천칭", "전갈", "사수", "염소"];
        return signs[d > dates[m - 1] ? m : m - 1];
      }

      // --- 4. 앱 구동 및 화면 렌더링 ---
      window.renderPage = function(view) {
        var html = '<style>' + css + '</style><div class="app-wrapper" id="app-wrapper"><div class="container">';
        
        if (view === 'home') {
          var currentUrl = window.location.href.split('?')[0];
          var counterBadgeUrl = "https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=" + encodeURIComponent(currentUrl) + "&count_bg=%2300f2ff&title_bg=%230d1117&title=%EB%B0%A9%EB%AC%B8%EC%9E%90&edge_flat=false";

          html += '<div class="intro-box"><h1>운명의 나침반</h1><p>천문 데이터 기반 프리미엄 운세 카운슬링</p>' +
            '<div style="margin-top: 18px;"><img src="' + counterBadgeUrl + '"></div></div>' +
            '<div class="card">' +
            '<label>대상자 성함</label><input type="text" id="ui-name" value="' + state.name + '" placeholder="성함을 입력하세요">' +
            '<label>입력할 달력 체계</label><div class="btn-row"><div id="s-btn" class="t-btn ' + (state.cal==='solar'?'on':'') + '" onclick="window.updateCal(\'solar\')">양력</div><div id="l-btn" class="t-btn ' + (state.cal==='lunar'?'on':'') + '" onclick="window.updateCal(\'lunar\')">음력</div></div>' +
            '<label>생년월일</label><div class="btn-row"><select id="ui-y"></select><select id="ui-m"></select><select id="ui-d"></select></div>' +
            '<label>태어난 시각</label><select id="ui-t">' +
            '<option value="미정">모름/미정</option><option value="자">자시</option><option value="축">축시</option><option value="인">인시</option><option value="묘">묘시</option><option value="진">진시</option><option value="사">사시</option><option value="오">오시</option><option value="미">미시</option><option value="신">신시</option><option value="유">유시</option><option value="술">술시</option><option value="해">해시</option></select>' +
            '</div>' +
            '<div class="method-grid">' +
            '<div class="method-card" onclick="window.executeFlow(\'saju\')"><h2>📜 정통 사주 심층 분석</h2><p>본인의 60갑자 기질과 재물 흐름 상세 풀이</p></div>' +
            '<div class="method-card" onclick="window.executeFlow(\'tojeong\')"><h2>🗓️ ' + currentYear + '년 토정비결</h2><p>144괘 알고리즘으로 분석한 올해 승부처</p></div>' +
            '<div class="method-card" onclick="window.executeFlow(\'star\')"><h2>✨ 서양 점성술</h2><p>황도 12궁 좌표로 분석한 당신만의 매력 자본</p></div>' +
            '<div class="method-card" onclick="window.renderPage(\'tarot-pick\')"><h2>🃏 타로 무의식 스캔</h2><p>현재 딜레마를 타파할 영적 솔루션</p></div>' +
            '</div>';
        } 
        else if (view === 'tarot-pick') {
          html += '<div class="intro-box"><h1>무의식의 거울</h1><p>운명이 이끄는 카드 한 장을 고르십시오.</p></div>' +
                  '<div class="tarot-pick">' +
                  '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>' +
                  '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>' +
                  '<div class="t-card" onclick="window.buildReport(\'tarot\')">🔮</div>' +
                  '</div>';
        }
        else if (view === 'result') {
          html += '<div id="loader"><h2>DECODING DESTINY MATRIX...</h2><div class="p-bar"><div class="p-fill" id="p-fill"></div></div></div>' +
                  '<div id="res-content" style="display:none;">' +
                  '<div class="intro-box"><h1 id="res-title"></h1></div>' +
                  '<div id="report-body"></div>' +
                  '<button class="btn-run" style="background:#1a1d23; color:#fff; margin-top:40px;" onclick="window.renderPage(\'home\')">홈 화면으로 돌아가기</button></div>';
        }

        html += '</div></div>' +
          '<nav class="nav">' +
          '<div class="nav-i ' + (view==='home'?'on':'') + '" onclick="window.renderPage(\'home\')"><b>🏠</b>홈</div>' +
          '<div class="nav-i" onclick="window.executeFlow(\'saju\')"><b>📜</b>사주</div>' +
          '<div class="nav-i" onclick="window.executeFlow(\'tojeong\')"><b>🗓️</b>토정</div>' +
          '<div class="nav-i" onclick="window.executeFlow(\'star\')"><b>✨</b>별자리</div>' +
          '<div class="nav-i" onclick="window.executeFlow(\'tarot\')"><b>🃏</b>타로</div>' +
          '</nav>';
        
        shadow.innerHTML = html;
        if (view === 'home') fillSelects();
      };

      window.updateCal = function(t) { 
        state.cal = t; 
        window.renderPage('home');
      };

      window.executeFlow = function(type) {
        var nInput = $('ui-name');
        if (nInput) {
          state.name = nInput.value;
          state.y = parseInt($('ui-y').value);
          state.m = parseInt($('ui-m').value);
          state.d = parseInt($('ui-d').value);
          state.time = $('ui-t').value;
        }
        if(!state.name) { alert("성함을 입력해 주십시오."); return; }
        
        if(type === 'tarot') { window.renderPage('tarot-pick'); }
        else { window.buildReport(type); }
      };

      window.buildReport = function(type) {
        window.renderPage('result');
        var p = 0; var fill = $('p-fill');
        var itv = setInterval(function() {
          p += 5; fill.style.width = p + '%';
          if(p >= 100) { clearInterval(itv); generateText(type); }
        }, 40);
      };

      async function generateText(type) {
        $('loader').style.display = 'none';
        $('res-content').style.display = 'block';
        
        var title = $('res-title');
        var body = $('report-body');
        
        var solarDate, lunarDate;
        var isLunarLoaded = (typeof Solar !== 'undefined' && typeof Lunar !== 'undefined');
        
        if (isLunarLoaded) {
          if (state.cal === 'solar') {
            solarDate = Solar.fromYmd(state.y, state.m, state.d);
            lunarDate = solarDate.getLunar();
          } else {
            lunarDate = Lunar.fromYmd(state.y, state.m, state.d);
            solarDate = lunarDate.getSolar();
          }
        }

        var sY = isLunarLoaded ? solarDate.getYear() : state.y;
        var sM = isLunarLoaded ? solarDate.getMonth() : state.m;
        var sD = isLunarLoaded ? solarDate.getDay() : state.d;

        var myGan = "甲"; var baziStr = "데이터 산출 중";
        if (isLunarLoaded) {
          var bazi = lunarDate.getEightChar();
          myGan = bazi.getDayGan();
          baziStr = bazi.getYearGan()+bazi.getYearZhi()+"년 "+bazi.getMonthGan()+bazi.getMonthZhi()+"월 "+bazi.getDayGan()+bazi.getDayZhi()+"일";
        }
        
        var ohaeng = getOhaeng(myGan);
        var seed = 0;
        for(var k=0; k<state.name.length; k++) { seed += state.name.charCodeAt(k); }
        seed += (sY + sM + sD);

        var processHtml = ""; var sections = [];

        if (type === 'saju') {
          title.innerText = state.name + "님의 프리미엄 사주 리포트";
          processHtml = "<div class='process-dashboard'><h3>📊 명리학 연산 데이터</h3><div class='data-grid'>" +
            "<div class='data-item'><b>입력날짜</b>" + state.y + "." + state.m + "." + state.d + "</div>" +
            "<div class='data-item'><b>사주명식</b>" + baziStr + "</div>" +
            "</div><div class='process-text'>" + expandDB.sajuMethod + "</div></div>";
          
          sections = [
            { t: "🌌 본원의 거울", s: "당신은 흔들리지 않는 " + ohaeng + "의 기운을 품고 있습니다.", d: "<p>" + ganTraits[myGan] + "</p>" },
            { t: "⏳ 인생 총운", s: "인생은 당신의 선택이 모여 완성되는 서사시입니다.", d: expandDB.lifetimeBase(seed) },
            { t: "💼 재물 테크 전략", s: "능동적인 가치 창출이 유리합니다.", d: expandDB.wealthBase(seed) }
          ];
        } 
        else if (type === 'tojeong') {
          title.innerText = state.name + "님의 " + currentYear + "년 토정비결";
          var tojeong = tojeongDB[seed % tojeongDB.length];
          sections = [
            { t: "📜 괘사 및 총운", s: "「 " + tojeong.h + " 」", d: "<p>" + tojeong.d1 + "</p>" },
            { t: "🎯 성공 전략", s: "운의 흐름을 읽는 것이 최고의 무기입니다.", d: "<p>" + tojeong.d2 + "</p>" }
          ];
        }
        else if (type === 'star') {
          var signKey = getStarSign(sM, sD);
          sections = [{ t: "✨ " + signKey + "자리 영혼의 매력", s: starTraits[signKey], d: "<p>당신은 고유한 우주적 지문을 타고났습니다. 본인의 개성을 발산할 때 가장 빛납니다.</p>" }];
        }
        else {
          var pick = tarotDB[seed % tarotDB.length];
          sections = [{ t: "🃏 타로 판독: " + pick.n, s: pick.s, d: "<p>" + pick.d + "</p>" }];
        }

        var htmlData = processHtml;
        for(var i=0; i<sections.length; i++) {
          htmlData += '<div class="report-sec" id="rsec-' + i + '">' +
                      '<div class="sec-t">' + sections[i].t + '</div>' +
                      '<div class="sum-box">" ' + sections[i].s + ' "</div>' +
                      '<div class="det-text" id="rdet-' + i + '"></div></div>';
        }

        // --- 수익화 섹션 (쿠팡 파트너스 반영) ---
        var luckyItems = ["메탈 시계", "가죽 지갑", "향수 디퓨저", "원석 팔찌"];
        var selectedItem = luckyItems[seed % 4];
        var dirs = ["정북쪽", "동남쪽", "서북쪽", "남서쪽"];
        var colors = ["코발트 블루", "딥 그린", "골드", "버건디"];

        htmlData += '<div class="card" style="margin-top:50px; background:linear-gradient(180deg, #0d1117, #000); border:1px solid #00f2ff;">' +
                    '<h3 style="color:#00f2ff; margin:0 0 15px; font-size:1.35rem; text-align:center; font-weight:900;">✨ ' + state.name + '님을 위한 개운(開運) 액션</h3>' +
                    '<p style="text-align:center; font-size:0.95rem; color:#768390; margin-bottom:25px;">막힌 운을 뚫어주는 전용 아이템과 행운의 기운입니다.</p>' +
                    '<div class="lucky-grid">' +
                    '<div class="l-item">행운의 방향<br><b style="color:#ffd700;">' + dirs[seed % 4] + '</b></div>' +
                    '<div class="l-item">길한 색상<br><b style="color:#ffd700;">' + colors[seed % 4] + '</b></div>' +
                    '<div class="l-item" style="grid-column: span 2;">오늘의 추천 행운 아이템<br><b style="color:#ffd700; font-size:1.3rem;">' + selectedItem + '</b></div>' +
                    '</div>' +
                    '<div style="text-align:center; margin-top:35px;">' +
                    '<a href="https://link.coupang.com/a/erqHD0?q=' + encodeURIComponent(selectedItem) + '" style="background:#00f2ff; color:#000; padding:18px 25px; border-radius:15px; text-decoration:none; font-weight:900; display:inline-block; font-size:1.1rem; box-shadow:0 10px 20px rgba(0,242,255,0.25);" target="_blank">👉 나의 행운 아이템 최저가 확인하기</a>' +
                    '</div></div>';

        body.innerHTML = htmlData;
        $('app-wrapper').scrollTo({top: 0, behavior: 'smooth'});

        for(var j=0; j<sections.length; j++) {
          var el = $('rdet-' + j); el.innerHTML = sections[j].d;
          (function(idx) { setTimeout(function() { $('rsec-' + idx).classList.add('show'); }, idx * 200); })(j);
        }
      }

      function fillSelects() {
        var sy = $('ui-y'), sm = $('ui-m'), sd = $('ui-d');
        for(var i=currentYear; i>=1940; i--) { var o = document.createElement('option'); o.value=i; o.text=i+"년"; sy.appendChild(o); } sy.value = state.y;
        for(var i=1; i<=12; i++) { var o = document.createElement('option'); o.value=i; o.text=i+"월"; sm.appendChild(o); } sm.value = state.m;
        for(var i=1; i<=31; i++) { var o = document.createElement('option'); o.value=i; o.text=i+"일"; sd.appendChild(o); } sd.value = state.d;
      }

      function initApp() {
        if (typeof Lunar === 'undefined') { setTimeout(initApp, 100); return; }
        window.renderPage('home');
      }
      initApp();

    })();
  </script>
</body>
</html>
