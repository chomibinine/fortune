          sections = [
            { t: "📜 괘사 및 총운", s: "「 " + to.h + " 」", d: "<p>"+expandDB.tojeongMethod+"</p><p>" + to.d1 + "</p>" }, 
            { t: "🎯 성공 전략", s: "운의 흐름이 곧 승부처입니다.", d: "<p>" + to.d2 + "</p>" }
          ];
        } else if(type === 'star') {
          var sk = extra || getStarSign(sol.getMonth(), sol.getDay());
          sections = [{ t: "✨ "+sk+"자리 영혼의 매력", s: starTraits[sk], d: "<p>"+expandDB.starMethod+"</p><p>당신만이 가진 고유한 매력을 인정하고 이를 세상에 증명할 때 기적 같은 성공이 시작됩니다.</p>" }];
        } else {
          var tk = tarotDB[seed % tarotDB.length];
          sections = [{ t: "🃏 타로 판독: "+tk.n, s: tk.s, d: "<p>"+expandDB.tarotMethod+"</p><p>"+tk.d+"</p>" }];
        }

        for(var i=0; i<sections.length; i++) {
          reportHTML += '<div class="report-sec" id="rsec-' + i + '"><div class="sec-t">' + sections[i].t + '</div><div class="sum-box">" ' + sections[i].s + ' "</div><div class="det-text" id="rdet-' + i + '"></div></div>';
        }

        // --- 쿠팡 수익화 로직 개선 (단축 링크가 아닌 검색 URL 사용) ---
        var itemMap = {"목(木)":"천연 식물 화분","화(火)":"조명 무드등","토(土)":"가죽 지갑","금(金)":"메탈 시계","수(水)":"텀블러"};
        var selItem = itemMap[ohaeng] || "행운 아이템";
        
        // ★ 쿠팡 파트너스 검색용 딥링크 수정 ★
        // 단축 링크(link.coupang.com/a/...) 뒤에 ?q= 를 붙이면 작동하지 않습니다.
        // 아래 'erqHD0'가 포함된 주소 대신 '검색 결과 페이지 전용' 주소를 사용하는 것이 정석이나,
        // 현재 링크를 활용해 검색 결과로 유도할 수 있도록 URL을 새롭게 구성합니다.
        var coupangSearchUrl = "https://www.coupang.com/np/search?q=" + encodeURIComponent(selItem) + "&utm_source=coupang_partners&utm_medium=affiliate&utm_campaign=link_erqHD0";

        reportHTML += '<div class="coupang-box">' +
          '<h3 style="color:#00f2ff; margin-bottom:15px; font-weight:900;">✨ '+state.name+'님을 위한 개운 비책</h3>' +
          '<p style="font-size:0.9rem; color:#768390; margin-bottom:20px;">귀하의 기운을 보완해줄 오늘의 추천 아이템입니다.</p>' +
          '<div class="sum-box" style="margin-bottom:25px;">오늘의 행운템: <b>'+selItem+'</b></div>' +
          '<a href="' + coupangSearchUrl + '" class="btn-buy" target="_blank">👉 '+selItem+' 최저가 확인하기</a>' +
          '<div class="coupang-disclaimer">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div></div>';

        $('report-body').innerHTML = reportHTML;
        $('app-wrapper').scrollTo({top: 0, behavior: 'smooth'});
        shadow.querySelectorAll('.report-sec').forEach((el, i) => setTimeout(() => el.classList.add('show'), i * 200));
      }

      function fillSelects() {
        var sy = $('ui-y'), sm = $('ui-m'), sd = $('ui-d');
        if(!sy) return;
        for(var i=currentYear; i>=1940; i--) sy.add(new Option(i+'년', i)); sy.value = state.y;
        for(var i=1; i<=12; i++) sm.add(new Option(i+'월', i)); sm.value = state.m;
        for(var i=1; i<=31; i++) sd.add(new Option(i+'일', i)); sd.value = state.d;
      }

      // --- 방문자 카운터 처리 로직 ---
      function handleCounter() {
        const todayKey = "visit_today_" + new Date().toDateString();
        const totalKey = "visit_total";

        let total = localStorage.getItem(totalKey);
        total = total ? parseInt(total) + 1 : 1;
        localStorage.setItem(totalKey, total);

        let today = localStorage.getItem(todayKey);
        today = today ? parseInt(today) + 1 : 1;
        localStorage.setItem(todayKey, today);

        const counterHtml = `
          <div style="text-align:center; margin:20px 0; color:#fff;">
            <div style="font-size:14px; opacity:0.7;">🔮 방문자 카운터</div>
            <div style="font-size:18px; margin-top:6px;">
              오늘 <span id="todayCount">${today}</span>명 · 전체 <span id="totalCount">${total}</span>명
            </div>
          </div>
        `;
        const container = $('counter-display');
        if(container) container.innerHTML = counterHtml;
      }

      function initApp() { if (typeof Lunar === 'undefined') { setTimeout(initApp, 100); return; } window.renderPage('home'); }
      initApp();
    })();
  </script>
</body>
</html>
